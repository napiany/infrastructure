---
- name: 'Copy vendored drop-in chrony configuration file'
  ansible.builtin.copy:
    owner: 'root'
    group: 'root'
    mode: '0644'
    src: 'external/metropolis-nexus/10-custom.conf'
    dest: '/etc/chrony.d/10-custom.conf'
  notify:
    - 'Restart chronyd'

- name: 'Configure chronyd command-line options'
  ansible.builtin.copy:
    owner: 'root'
    group: 'root'
    mode: '0644'
    dest: '/etc/sysconfig/chronyd'
    content: 'OPTIONS="-F1 -r"'
  notify:
    - 'Restart chronyd'

- name: 'Configure chronyd service override'
  block:
    - name: 'Ensure /etc/systemd/system/chronyd.service.d/ exists'
      ansible.builtin.file:
        path: '/etc/systemd/system/chronyd.service.d/'
        state: 'directory'
        owner: 'root'
        group: 'root'
        mode: '0755'

    - name: 'Copy vendored configuration file for chronyd override'
      ansible.builtin.copy:
        owner: 'root'
        group: 'root'
        mode: '0644'
        src: 'external/grapheneos/chronyd-override.conf'
        dest: '/etc/systemd/system/chronyd.service.d/override.conf'
      notify: 'Restart chronyd'

- name: 'Configure chronyd state cleanup'
  ansible.builtin.copy:
    owner: 'root'
    group: 'root'
    mode: '0644'
    dest: '/etc/tmpfiles.d/chronyd'
    content: 'd /var/lib/chrony 0755 chrony chrony 30d'
