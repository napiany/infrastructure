---
- name: 'NetworkManager override'
  block:
    - name: 'Ensure /etc/systemd/system/NetworkManager.service.d exists'
      ansible.builtin.file:
        path: '/etc/systemd/system/NetworkManager.service.d'
        state: 'directory'
        owner: 'root'
        group: 'root'
        mode: '0755'

    - name: 'Copy vendored override for NetworkManager'
      ansible.builtin.copy:
        owner: 'root'
        group: 'root'
        mode: '0644'
        src: 'external/divested/99-brace.conf'
        dest: '/etc/systemd/system/NetworkManager.service.d/override.conf'
      notify: 'Restart NetworkManager'

- name: 'Configure NetworkManager privacy enhancements'
  when: "'desktops' in group_names"
  block:
    - name: 'Copy vendored macrandomize config for NetworkManager'
      ansible.builtin.copy:
        owner: 'root'
        group: 'root'
        mode: '0644'
        src: 'external/metropolis-nexus/00-macrandomize.conf'
        dest: '/etc/NetworkManager/conf.d/00-macrandomize.conf'
      notify: 'Restart NetworkManager'

    - name: 'Copy vendored transient hostname config for NetworkManager'
      ansible.builtin.copy:
        owner: 'root'
        group: 'root'
        mode: '0644'
        src: 'external/metropolis-nexus/01-transient-hostname.conf'
        dest: '/etc/NetworkManager/conf.d/01-transient-hostname.conf'
      notify: 'Restart NetworkManager'
