---
- name: 'Reboot'
  ansible.builtin.reboot:

- name: 'Daemon reload'
  ansible.builtin.systemd:
    daemon_reload: true

- name: 'List installed systemd service units for Podman network recreation'
  ansible.builtin.command:
    argv:
      - 'systemctl'
      - 'list-unit-files'
      - '--type=service'
      - '--no-legend'
      - '--plain'
  register: 'podman_installed_units'
  changed_when: false
  listen: 'Recreate changed Podman networks'

- name: 'Set changed Podman network units'
  ansible.builtin.set_fact:
    podman_installed_unit_names: '{{ podman_installed_units.stdout_lines | map("regex_replace", "^([^ ]+).*$", "\\1") | list }}'
    podman_existing_network_basenames: >-
      {{
        podman_changed_networks
        | default([])
        | unique
        | map("regex_replace", "(\\.network|-network\\.service)$", "")
        | list
      }}
    podman_existing_network_units: '{{ podman_existing_network_basenames | map("regex_replace", "$", "-network.service") | list }}'
  listen: 'Recreate changed Podman networks'

- name: 'Set changed Podman network restart units'
  ansible.builtin.set_fact:
    podman_existing_network_restart_units: '{{ (podman_network_units_to_restart | default([]) | unique) | intersect(podman_installed_unit_names) }}'
  listen: 'Recreate changed Podman networks'

- name: 'Stop dependent services before recreating Podman networks'
  ansible.builtin.systemd:
    name: '{{ item }}'
    state: 'stopped'
  loop: '{{ podman_existing_network_restart_units | default([]) | reverse }}'
  when: '(podman_existing_network_restart_units | default([]) | length) > 0'
  listen: 'Recreate changed Podman networks'

- name: 'Set changed Podman network names'
  ansible.builtin.set_fact:
    podman_existing_network_names: '{{ podman_existing_network_basenames | default([]) | map("regex_replace", "^", "systemd-") | list }}'
  listen: 'Recreate changed Podman networks'

- name: 'List containers attached to changed Podman networks'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'ps'
      - '-aq'
      - '--filter'
      - 'network={{ item }}'
  loop: '{{ podman_existing_network_names | default([]) }}'
  register: 'podman_network_container_query'
  changed_when: false
  failed_when: false
  when: '(podman_existing_network_names | default([]) | length) > 0'
  listen: 'Recreate changed Podman networks'

- name: 'Set containers attached to changed Podman networks'
  ansible.builtin.set_fact:
    podman_attached_network_container_ids: '{{ podman_network_container_query.results | map(attribute="stdout_lines") | flatten | reject("equalto", "") | unique | list }}'
  when: 'podman_network_container_query is defined'
  listen: 'Recreate changed Podman networks'

- name: 'Remove containers attached to changed Podman networks'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'rm'
      - '-f'
      - '-i'
      - '{{ item }}'
  loop: '{{ podman_attached_network_container_ids | default([]) }}'
  when: '(podman_attached_network_container_ids | default([]) | length) > 0'
  changed_when: false
  failed_when: false
  listen: 'Recreate changed Podman networks'

- name: 'Restart changed Podman network units'
  ansible.builtin.systemd:
    name: '{{ item }}'
    state: 'restarted'
  loop: '{{ podman_existing_network_units | default([]) }}'
  when: '(podman_existing_network_units | default([]) | length) > 0'
  listen: 'Recreate changed Podman networks'

- name: 'Start dependent services after recreating Podman networks'
  ansible.builtin.systemd:
    name: '{{ item }}'
    state: 'started'
  loop: '{{ podman_existing_network_restart_units | default([]) }}'
  when: '(podman_existing_network_restart_units | default([]) | length) > 0'
  listen: 'Recreate changed Podman networks'

- name: 'List installed systemd service units for Podman restart'
  ansible.builtin.command:
    argv:
      - 'systemctl'
      - 'list-unit-files'
      - '--type=service'
      - '--no-legend'
      - '--plain'
  register: 'podman_installed_units'
  changed_when: false
  listen: 'Restart changed Podman units'

- name: 'Set changed Podman service units'
  ansible.builtin.set_fact:
    podman_existing_restart_units: '{{ (podman_units_to_restart | default([]) | unique) | intersect(podman_installed_units.stdout_lines | map("regex_replace", "^([^ ]+).*$", "\\1") | list) }}'
  listen: 'Restart changed Podman units'

- name: 'Restart changed Podman units'
  ansible.builtin.systemd:
    name: '{{ item }}'
    state: 'restarted'
    enabled: true
  loop: '{{ podman_existing_restart_units | default([]) }}'
  when: '(podman_existing_restart_units | default([]) | length) > 0'
  listen: 'Restart changed Podman units'

- name: 'Restart haproxy'
  ansible.builtin.systemd:
    name: 'haproxy.service'
    state: 'restarted'
    enabled: true
  tags:
    - 'haproxy'

- name: 'Restart crowdsec'
  ansible.builtin.systemd:
    name: 'crowdsec.service'
    state: 'restarted'
    enabled: true

- name: 'Restart crowdsec-spoa'
  ansible.builtin.systemd:
    name: 'crowdsec-spoa.service'
    state: 'restarted'
    enabled: true

- name: 'Restart wireguard'
  ansible.builtin.systemd:
    name: 'wg-quick@wg0.service'
    state: 'restarted'
    enabled: true

- name: 'Restart certbot timer'
  ansible.builtin.systemd:
    name: 'certbot.timer'
    state: 'restarted'
    enabled: true

- name: 'Try restart podman secret consumers'
  ansible.builtin.command:
    argv:
      - 'systemctl'
      - 'try-restart'
      - '{{ item }}'
  loop: '{{ podman_secret_consumer_units | default([]) | unique }}'
  changed_when: false
  failed_when: false
