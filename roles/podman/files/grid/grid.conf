server {
    listen 443 ssl;
    include snippets/proxy-protocol-listener.conf;
    listen [::]:443 ssl;

    http2 on;

    server_name grid.napiany.com;

    ssl_certificate /etc/letsencrypt/consumers/nginx/grid.napiany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/consumers/nginx/grid.napiany.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/consumers/nginx/grid.napiany.com/chain.pem;

    include snippets/universal_paths.conf;
    include snippets/security.conf;
    include snippets/proxy.conf;
    include snippets/robots.conf;

    client_max_body_size 50M;

    location = /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 '{"m.homeserver":{"base_url":"https://grid.napiany.com"}}';
    }

    location /_matrix {
        set $upstream_grid http://10.89.108.2:8008;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 610s;
        proxy_send_timeout 60s;
        proxy_pass $upstream_grid;
    }

    location /_synapse/client {
        set $upstream_grid http://10.89.108.2:8008;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 610s;
        proxy_send_timeout 60s;
        proxy_pass $upstream_grid;
    }

    location = / {
        default_type text/plain;
        return 200 "Grid Matrix homeserver\n";
    }

    location / {
        return 404;
    }
}
