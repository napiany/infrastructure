server {
    listen 443 ssl;
    include snippets/proxy-protocol-listener.conf;
    listen [::]:443 ssl;

    http2 on;

    server_name push.napiany.com;

    ssl_certificate /etc/letsencrypt/consumers/nginx/push.napiany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/consumers/nginx/push.napiany.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/consumers/nginx/push.napiany.com/chain.pem;

    include snippets/universal_paths.conf;
    include snippets/security.conf;
    include snippets/permissions.conf;
    include snippets/proxy.conf;
    include snippets/robots.conf;

    limit_conn_status 429;
    limit_req_status 429;
    limit_conn autopush_conn_per_ip 10;
    limit_req zone=autopush_req_per_ip burst=20 nodelay;

    location = /health {
        include snippets/local-ip-only.conf;
        set $upstream_autoconnect http://10.89.104.2:8080;
        proxy_buffering off;
        proxy_read_timeout 610s;
        proxy_send_timeout 60s;
        proxy_pass $upstream_autoconnect;
    }

    location = /__heartbeat__ {
        include snippets/local-ip-only.conf;
        set $upstream_autoconnect http://10.89.104.2:8080;
        proxy_buffering off;
        proxy_read_timeout 610s;
        proxy_send_timeout 60s;
        proxy_pass $upstream_autoconnect;
    }

    location = /__version__ {
        include snippets/local-ip-only.conf;
        set $upstream_autoconnect http://10.89.104.2:8080;
        proxy_buffering off;
        proxy_read_timeout 610s;
        proxy_send_timeout 60s;
        proxy_pass $upstream_autoconnect;
    }

    location / {
        set $upstream_autoconnect http://10.89.104.2:8080;
        proxy_buffering off;
        proxy_read_timeout 610s;
        proxy_send_timeout 60s;
        proxy_pass $upstream_autoconnect;
    }
}

server {
    listen 443 ssl;
    include snippets/proxy-protocol-listener.conf;
    listen [::]:443 ssl;

    http2 on;

    server_name updates.push.napiany.com;

    ssl_certificate /etc/letsencrypt/consumers/nginx/push.napiany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/consumers/nginx/push.napiany.com/privkey.pem;
