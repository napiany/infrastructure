server {
    listen 443 ssl;
    listen 8443 ssl proxy_protocol;
    listen [::]:443 ssl;

    server_name api.ente.napiany.com;

    ssl_certificate /etc/letsencrypt/live/api.ente.napiany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ente.napiany.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.ente.napiany.com/chain.pem;

    include snippets/universal_paths.conf;
    include snippets/security.conf;
    include snippets/permissions.conf;
    include snippets/proxy.conf;
    include snippets/robots.conf;

    resolver 10.89.109.1 valid=30s ipv6=off;

    location / {
        set $upstream_ente_museum http://ente-museum:8080;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass $upstream_ente_museum;
    }
}

server {
    listen 443 ssl;
    listen 8443 ssl proxy_protocol;
    listen [::]:443 ssl;

    server_name s3.ente.napiany.com;

    ssl_certificate /etc/letsencrypt/live/api.ente.napiany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ente.napiany.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.ente.napiany.com/chain.pem;

    include snippets/universal_paths.conf;
    include snippets/security.conf;
    include snippets/permissions.conf;
    include snippets/proxy.conf;
    include snippets/robots.conf;

    resolver 10.89.109.1 valid=30s ipv6=off;

    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, PUT, POST, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Content-Length, Content-MD5, Authorization, X-Amz-Date, X-Amz-Content-Sha256, X-Amz-Security-Token, X-Requested-With, X-Auth-Token, X-Client-Package, X-Client-Version, Origin, Accept, Range' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type 'text/plain; charset=UTF-8';
            return 204;
        }

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, PUT, POST, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Content-Length, Content-MD5, Authorization, X-Amz-Date, X-Amz-Content-Sha256, X-Amz-Security-Token, X-Requested-With, X-Auth-Token, X-Client-Package, X-Client-Version, Origin, Accept, Range' always;
        add_header Access-Control-Expose-Headers 'ETag, x-amz-request-id, x-amz-id-2' always;

        set $upstream_ente_garage http://ente-garage:3900;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass $upstream_ente_garage;
    }
}

