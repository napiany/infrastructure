lua_package_path '/usr/local/lua/crowdsec/?.lua;;';
lua_shared_dict crowdsec_cache 50m;
lua_ssl_trusted_certificate /etc/ssl/ca-bundle.pem;

init_by_lua_block {
    local cs = require 'crowdsec'
    local ok, err = cs.init(
        '/etc/nginx/snippets/crowdsec-nginx-bouncer.conf',
        'crowdsec-nginx-bouncer/v1.1.1'
    )

    if ok == nil then
        ngx.log(ngx.ERR, '[CrowdSec] ' .. err)
        error(err)
    end

    ngx.log(ngx.ALERT, '[CrowdSec] Initialisation done')
}

map $server_addr $crowdsec_unix {
    default 0;
    '~unix:' 1;
}

map $host $crowdsec_bypass {
    default 0;
    s3.ente.napiany.com 1;
}

access_by_lua_block {
    local cs = require 'crowdsec'

    if ngx.var.crowdsec_unix == '1' then
        ngx.log(ngx.DEBUG, '[CrowdSec] Unix socket request ignoring...')
    elseif ngx.var.crowdsec_bypass == '1' then
        ngx.log(
            ngx.DEBUG,
            '[CrowdSec] Host bypass configured for ' .. ngx.var.host
        )
    else
        cs.Allow(ngx.var.remote_addr)
    end
}

init_worker_by_lua_block {
    local cs = require 'crowdsec'
    local mode = cs.get_mode()

    if string.lower(mode) == 'stream' then
        ngx.log(
            ngx.INFO,
            'Initializing stream mode for worker ' .. tostring(ngx.worker.id())
        )
        cs.SetupStream()
    end

    if ngx.worker.id() == 0 then
        ngx.log(
            ngx.INFO,
            'Initializing metrics for worker ' .. tostring(ngx.worker.id())
        )
        cs.SetupMetrics()
    end
}
