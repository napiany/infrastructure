server {
    listen 443 ssl;
    listen 8443 ssl proxy_protocol;
    listen [::]:443 ssl;

    server_name vault.napiany.com;

    ssl_certificate /etc/letsencrypt/live/vault.napiany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.napiany.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/vault.napiany.com/chain.pem;

    include snippets/universal_paths.conf;
    include snippets/permissions.conf;
    include snippets/cross-origin-security.conf;
    include snippets/proxy.conf;
    include snippets/robots.conf;

    proxy_hide_header Strict-Transport-Security;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    proxy_hide_header Access-Control-Max-Age;
    add_header Access-Control-Max-Age "600" always;
    proxy_hide_header Referrer-Policy;
    add_header Referrer-Policy "same-origin" always;
    proxy_hide_header X-Content-Type-Options;
    add_header X-Content-Type-Options "nosniff" always;
    proxy_hide_header X-Permitted-Cross-Domain-Policies;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    proxy_hide_header X-XSS-Protection;
    add_header X-XSS-Protection "0" always;
    proxy_hide_header X-Frame-Options;
    add_header X-Frame-Options "SAMEORIGIN" always;

    resolver 10.89.101.1 valid=30s ipv6=off;

    location ^~ /admin {
        include snippets/local-ip-only.conf;
        set $upstream_vaultwarden http://vaultwarden:8080;
        proxy_pass $upstream_vaultwarden;
    }

    location / {
        set $upstream_vaultwarden http://vaultwarden:8080;
        proxy_pass $upstream_vaultwarden;
    }
}
