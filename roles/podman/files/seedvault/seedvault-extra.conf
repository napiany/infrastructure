ServerName seedvault.napiany.com
ServerTokens Prod
ServerSignature Off
TraceEnable off
Timeout 3600
# SeedVault uploads can pause for longer than Apache's default 20s body timeout.
RequestReadTimeout header=20-40,MinRate=500 body=0
PidFile /tmp/httpd.pid
Mutex default:/tmp
DavLockDB /tmp/DavLock

<Directory "/data">
    AllowOverride None
    Options Indexes
    Require all granted
</Directory>

<LocationMatch "^/(?!pixel8pro(?:/|$)|pixel8a(?:/|$))">
    Require all denied
</LocationMatch>

<Location "/pixel8pro">
    DAV On
    DavDepthInfinity On
    DirectorySlash Off
    AuthType Basic
    AuthName "SeedVault Backups"
    AuthUserFile "/config/htpasswd"
    Require user pixel8pro
</Location>

<Location "/pixel8a">
    DAV On
    DavDepthInfinity On
    DirectorySlash Off
    AuthType Basic
    AuthName "SeedVault Backups"
    AuthUserFile "/config/htpasswd"
    Require user pixel8a
</Location>
