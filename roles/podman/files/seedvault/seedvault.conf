server {
    listen 443 ssl;
    listen 8443 ssl proxy_protocol;
    listen [::]:443 ssl;

    http2 on;

    server_name seedvault.napiany.com;

    ssl_certificate /etc/letsencrypt/live/seedvault.napiany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seedvault.napiany.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/seedvault.napiany.com/chain.pem;

    include snippets/universal_paths.conf;
    include snippets/security.conf;
    include snippets/permissions.conf;
    include snippets/proxy.conf;
    include snippets/robots.conf;

    resolver 10.89.110.1 valid=30s ipv6=off;

    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;

    location / {
        set $upstream_seedvault http://seedvault:8080;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass $upstream_seedvault;
    }
}
