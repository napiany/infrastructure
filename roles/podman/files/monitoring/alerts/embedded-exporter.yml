---
groups:
  - name: 'EmbeddedExporter'
    rules:
      - alert: 'PrometheusJobMissing'
        expr: 'absent(up{job="prometheus"})'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus job missing (instance {{ $labels.instance }})'
          description: 'A Prometheus job has disappeared VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusAllTargetsMissing'
        expr: 'sum by (job) (up{job!~"^blackbox_.*$"}) == 0'
        for: '5m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus all targets missing (instance {{ $labels.instance }})'
          description: 'A Prometheus job does not have living target anymore. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTargetMissingWithWarmupTime'
        expr: 'sum by (instance, job) ((up == 0) * on (host) group_left(__name__) (node_time_seconds - node_boot_time_seconds > 600))'
        for: '5m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus target missing with warmup time (instance {{ $labels.instance }})'
          description: 'Allow a job time to start up (10 minutes) before alerting that it''s down. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusConfigurationReloadFailure'
        expr: 'prometheus_config_last_reload_successful != 1'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus configuration reload failure (instance {{ $labels.instance }})'
          description: 'Prometheus configuration reload error VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTooManyRestarts'
        expr: 'changes(process_start_time_seconds{job=~"alloy|prometheus|pushgateway|alertmanager"}[15m]) > 2'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus too many restarts (instance {{ $labels.instance }})'
          description: 'Prometheus has restarted more than twice in the last 15 minutes. It might be crashlooping. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusAlertManagerJobMissing'
        expr: 'absent(up{job="alertmanager"})'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus AlertManager job missing (instance {{ $labels.instance }})'
          description: 'A Prometheus AlertManager job has disappeared VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusAlertManagerConfigurationReloadFailure'
        expr: 'alertmanager_config_last_reload_successful != 1'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus AlertManager configuration reload failure (instance {{ $labels.instance }})'
          description: 'AlertManager configuration reload error VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusNotConnectedToAlertmanager'
        expr: 'prometheus_notifications_alertmanagers_discovered < 1'
        for: '2m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus not connected to alertmanager (instance {{ $labels.instance }})'
          description: 'Prometheus cannot connect the alertmanager VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusRuleEvaluationFailures'
        expr: 'increase(prometheus_rule_evaluation_failures_total[3m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus rule evaluation failures (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} rule evaluation failures, leading to potentially ignored alerts. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTemplateTextExpansionFailures'
        expr: 'increase(prometheus_template_text_expansion_failures_total[3m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus template text expansion failures (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} template text expansion failures VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusRuleEvaluationSlow'
        expr: 'prometheus_rule_group_last_duration_seconds > prometheus_rule_group_interval_seconds'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus rule evaluation slow (instance {{ $labels.instance }})'
          description: 'Prometheus rule evaluation took more time than the scheduled interval. It indicates a slower storage backend access or too complex query. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusNotificationsBacklog'
        expr: 'min_over_time(prometheus_notifications_queue_length[10m]) > 0'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus notifications backlog (instance {{ $labels.instance }})'
          description: 'The Prometheus notification queue has not been empty for 10 minutes VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusAlertManagerNotificationFailing'
        expr: 'rate(alertmanager_notifications_failed_total[3m]) > 0.05'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus AlertManager notification failing (instance {{ $labels.instance }})'
          description: 'Alertmanager is failing sending notifications ({{ $value }} notifications/s) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusLargeScrape'
        expr: 'increase(prometheus_target_scrapes_exceeded_sample_limit_total[10m]) > 10'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus large scrape (instance {{ $labels.instance }})'
          description: 'Prometheus has many scrapes that exceed the sample limit ({{ $value }} scrapes) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTargetScrapeDuplicate'
        expr: 'increase(prometheus_target_scrapes_sample_duplicate_timestamp_total[5m]) > 3'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Prometheus target scrape duplicate (instance {{ $labels.instance }})'
          description: 'Prometheus has many samples rejected due to duplicate timestamps but different values ({{ $value }} samples) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTSDBCheckpointCreationFailures'
        expr: 'increase(prometheus_tsdb_checkpoint_creations_failed_total[1m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus TSDB checkpoint creation failures (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} checkpoint creation failures VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTSDBCheckpointDeletionFailures'
        expr: 'increase(prometheus_tsdb_checkpoint_deletions_failed_total[1m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus TSDB checkpoint deletion failures (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} checkpoint deletion failures VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTSDBCompactionsFailed'
        expr: 'increase(prometheus_tsdb_compactions_failed_total[1m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus TSDB compactions failed (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} TSDB compactions failures VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTSDBHeadTruncationsFailed'
        expr: 'increase(prometheus_tsdb_head_truncations_failed_total[1m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus TSDB head truncations failed (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} TSDB head truncation failures VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTSDBReloadFailures'
        expr: 'increase(prometheus_tsdb_reloads_failures_total[1m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus TSDB reload failures (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} TSDB reload failures VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTSDBWALCorruptions'
        expr: 'increase(prometheus_tsdb_wal_corruptions_total[1m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus TSDB WAL corruptions (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} TSDB WAL corruptions VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PrometheusTSDBWALTruncationsFailed'
        expr: 'increase(prometheus_tsdb_wal_truncations_failed_total[1m]) > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Prometheus TSDB WAL truncations failed (instance {{ $labels.instance }})'
          description: 'Prometheus encountered {{ $value }} TSDB WAL truncation failures VALUE = {{ $value }} LABELS = {{ $labels }}'
