---
groups:
  - name: 'PostgresExporter'
    rules:
      - alert: 'PostgresqlDown'
        expr: 'pg_up == 0'
        for: '1m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Postgresql down (instance {{ $labels.instance }})'
          description: 'Postgresql instance is down VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlRestarted'
        expr: 'time() - pg_postmaster_start_time_seconds < 60'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql restarted (instance {{ $labels.instance }})'
          description: 'Postgresql restarted VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlExporterError'
        expr: 'pg_exporter_last_scrape_error > 0'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Postgresql exporter error (instance {{ $labels.instance }})'
          description: 'Postgresql exporter is showing errors. A query may be buggy in query.yaml VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlTableNotAutoVacuumed'
        expr: '((pg_stat_user_tables_n_tup_del + pg_stat_user_tables_n_tup_upd + pg_stat_user_tables_n_tup_hot_upd) > pg_settings_autovacuum_vacuum_threshold) and (time() - pg_stat_user_tables_last_autovacuum) > 60 * 60 * 24 * 10'
        for: '1h'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql table not auto vacuumed (instance {{ $labels.instance }})'
          description: 'Table {{ $labels.relname }} has not been auto vacuumed for 10 days VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlTableNotAutoAnalyzed'
        expr: '((pg_stat_user_tables_n_tup_del + pg_stat_user_tables_n_tup_upd + pg_stat_user_tables_n_tup_hot_upd) > pg_settings_autovacuum_analyze_threshold) and (time() - pg_stat_user_tables_last_autoanalyze) > 24 * 60 * 60 * 10'
        for: '1h'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql table not auto analyzed (instance {{ $labels.instance }})'
          description: 'Table {{ $labels.relname }} has not been auto analyzed for 10 days VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlTooManyConnections'
        expr: 'sum by (instance, job, server) (pg_stat_activity_count) > min by (instance, job, server) (pg_settings_max_connections * 0.9)'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql too many connections (instance {{ $labels.instance }})'
          description: 'PostgreSQL instance has too many connections (> 90%). VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlDeadLocks'
        expr: 'increase(pg_stat_database_deadlocks{datname!~"template.*|postgres",datid!="0"}[1m]) > 5'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql dead locks (instance {{ $labels.instance }})'
          description: 'PostgreSQL has dead-locks ({{ $value }} in the last minute) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlHighRollbackRate'
        expr: 'sum by (namespace,datname,instance) (rate(pg_stat_database_xact_rollback{datname!~"template.*|postgres",datid!="0"}[3m])) / (sum by (namespace,datname,instance) (rate(pg_stat_database_xact_rollback{datname!~"template.*|postgres",datid!="0"}[3m])) + sum by (namespace,datname,instance) (rate(pg_stat_database_xact_commit{datname!~"template.*|postgres",datid!="0"}[3m]))) > 0.10 and (sum by (namespace,datname,instance)
          (rate(pg_stat_database_xact_rollback{datname!~"template.*|postgres",datid!="0"}[3m])) + sum by (namespace,datname,instance) (rate(pg_stat_database_xact_commit{datname!~"template.*|postgres",datid!="0"}[3m]))) > 0'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql high rollback rate (instance {{ $labels.instance }})'
          description: 'Ratio of transactions being aborted compared to committed is > 10 % VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlUnusedReplicationSlot'
        expr: '(pg_replication_slots_active == 0) and (pg_replication_is_replica == 0)'
        for: '10m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql unused replication slot (instance {{ $labels.instance }})'
          description: 'Unused Replication Slots VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlTooManyDeadTuples'
        expr: '((pg_stat_user_tables_n_dead_tup > 10000) / (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup)) >= 0.1 and (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup) > 0'
        for: '30m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql too many dead tuples (instance {{ $labels.instance }})'
          description: 'PostgreSQL dead tuples is too large VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlTooManyLocksAcquired'
        expr: '((sum by (instance) (pg_locks_count)) / (pg_settings_max_locks_per_transaction * pg_settings_max_connections)) > 0.80 and (pg_settings_max_locks_per_transaction * pg_settings_max_connections) > 0'
        for: '5m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Postgresql too many locks acquired (instance {{ $labels.instance }})'
          description: 'Too many locks acquired on the database. If this alert happens frequently, we may need to increase the postgres setting max_locks_per_transaction. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlBloatIndexHigh(>80%)'
        expr: 'pg_bloat_btree_bloat_pct > 80 and on (idxname) (pg_bloat_btree_real_size > 100000000)'
        for: '1h'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql bloat index high (> 80%) (instance {{ $labels.instance }})'
          description: 'The index {{ $labels.idxname }} is bloated. You should execute `REINDEX INDEX CONCURRENTLY {{ $labels.idxname }};` VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlBloatTableHigh(>80%)'
        expr: 'pg_bloat_table_bloat_pct > 80 and on (relname) (pg_bloat_table_real_size > 200000000)'
        for: '1h'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql bloat table high (> 80%) (instance {{ $labels.instance }})'
          description: 'The table {{ $labels.relname }} is bloated. You should execute `VACUUM {{ $labels.relname }};` VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlInvalidIndex'
        expr: 'pg_general_index_info_pg_relation_size{indexrelname=~".*ccnew.*"}'
        for: '6h'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql invalid index (instance {{ $labels.instance }})'
          description: 'The table {{ $labels.relname }} has an invalid index: {{ $labels.indexrelname }}. You should execute `DROP INDEX {{ $labels.indexrelname }};` VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'PostgresqlReplicationLag'
        expr: 'pg_replication_lag_seconds > 60'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Postgresql replication lag (instance {{ $labels.instance }})'
          description: 'The PostgreSQL replication lag is high (> 60s) VALUE = {{ $value }} LABELS = {{ $labels }}'
