---
groups:
  - name: 'NodeExporter'
    rules:
      - alert: 'HostOutOfMemory'
        expr: '(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < .10)'
        for: '2m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host out of memory (instance {{ $labels.instance }})'
          description: 'Node memory is filling up (< 10% left) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostMemoryUnderMemoryPressure'
        expr: '(deriv(node_vmstat_pgmajfault[5m]) > 1000)'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host memory under memory pressure (instance {{ $labels.instance }})'
          description: 'The node is under heavy memory pressure. High rate of major page faults ({{ $value }}/s). VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostUnusualNetworkThroughputIn'
        expr: '((rate(node_network_receive_bytes_total{device!~"^(lo|veth.*|podman.*|br-.*|docker.*)$"}[5m]) / node_network_speed_bytes{device!~"^(lo|veth.*|podman.*|br-.*|docker.*)$"}) > .90) and node_network_speed_bytes{device!~"^(lo|veth.*|podman.*|br-.*|docker.*)$"} > 0'
        for: '10m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host unusual network throughput in (instance {{ $labels.instance }})'
          description: 'Host receive bandwidth is high (>90%). VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostUnusualNetworkThroughputOut'
        expr: '((rate(node_network_transmit_bytes_total{device!~"^(lo|veth.*|podman.*|br-.*|docker.*)$"}[5m]) / node_network_speed_bytes{device!~"^(lo|veth.*|podman.*|br-.*|docker.*)$"}) > .90) and node_network_speed_bytes{device!~"^(lo|veth.*|podman.*|br-.*|docker.*)$"} > 0'
        for: '10m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host unusual network throughput out (instance {{ $labels.instance }})'
          description: 'Host transmit bandwidth is high (>90%) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostOutOfDiskSpace'
        expr: '(node_filesystem_avail_bytes{fstype!~"^(fuse.*|tmpfs|cifs|nfs)"} / node_filesystem_size_bytes < .10 and on (instance, device, mountpoint) node_filesystem_readonly == 0)'
        for: '2m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Host out of disk space (instance {{ $labels.instance }})'
          description: 'Disk is almost full (< 10% left) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostDiskMayFillIn24Hours'
        expr: 'predict_linear(node_filesystem_avail_bytes{fstype!~"^(fuse.*|tmpfs|cifs|nfs)"}[3h], 86400) <= 0 and node_filesystem_avail_bytes > 0'
        for: '15m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host disk may fill in 24 hours (instance {{ $labels.instance }})'
          description: 'Filesystem will likely run out of space within the next 24 hours. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostOutOfInodes'
        expr: '(node_filesystem_files_free / node_filesystem_files < .10 and ON (instance, device, mountpoint) node_filesystem_readonly == 0) and node_filesystem_files > 0'
        for: '2m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Host out of inodes (instance {{ $labels.instance }})'
          description: 'Disk is almost running out of available inodes (< 10% left) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostFilesystemDeviceError'
        expr: 'node_filesystem_device_error{fstype!~"^(fuse.*|tmpfs|cifs|nfs)"} == 1'
        for: '2m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Host filesystem device error (instance {{ $labels.instance }})'
          description: 'Error stat-ing the {{ $labels.mountpoint }} filesystem VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostInodesMayFillIn24Hours'
        expr: 'predict_linear(node_filesystem_files_free{fstype!~"^(fuse.*|tmpfs|cifs|nfs)"}[1h], 86400) <= 0 and node_filesystem_files_free > 0'
        for: '15m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host inodes may fill in 24 hours (instance {{ $labels.instance }})'
          description: 'Filesystem will likely run out of inodes within the next 24 hours at current write rate VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostUnusualDiskReadLatency'
        expr: '(rate(node_disk_read_time_seconds_total[1m]) / rate(node_disk_reads_completed_total[1m]) > 0.1 and rate(node_disk_reads_completed_total[1m]) > 0)'
        for: '2m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host unusual disk read latency (instance {{ $labels.instance }})'
          description: 'Disk latency is growing (read operations > 100ms) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostUnusualDiskWriteLatency'
        expr: '(rate(node_disk_write_time_seconds_total[1m]) / rate(node_disk_writes_completed_total[1m]) > 0.1 and rate(node_disk_writes_completed_total[1m]) > 0)'
        for: '2m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host unusual disk write latency (instance {{ $labels.instance }})'
          description: 'Disk latency is growing (write operations > 100ms) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostHighCPULoad'
        expr: '1 - (avg without (cpu) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > .80'
        for: '10m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host high CPU load (instance {{ $labels.instance }})'
          description: 'CPU load is > 80% VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostCPUStealNoisyNeighbor'
        expr: 'avg without (cpu) (rate(node_cpu_seconds_total{mode="steal"}[5m])) * 100 > 10'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host CPU steal noisy neighbor (instance {{ $labels.instance }})'
          description: 'CPU steal is > 10%. A noisy neighbor is killing VM performances or a spot instance may be out of credit. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostCPUHighIowait'
        expr: 'avg without (cpu) (rate(node_cpu_seconds_total{mode="iowait"}[5m])) > .10'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host CPU high iowait (instance {{ $labels.instance }})'
          description: 'CPU iowait > 10%. Your CPU is idling waiting for storage to respond. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostUnusualDiskIO'
        expr: 'rate(node_disk_io_time_seconds_total[5m]) > 0.8'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host unusual disk IO (instance {{ $labels.instance }})'
          description: 'Disk usage >80%. Check storage for issues or increase IOPS capabilities. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostContextSwitchingHigh'
        expr: '((rate(node_context_switches_total[15m]) / count without(mode,cpu) (node_cpu_seconds_total{mode="idle"})) / (rate(node_context_switches_total[1d]) / count without(mode,cpu) (node_cpu_seconds_total{mode="idle"})) > 2) and (rate(node_context_switches_total[15m]) / count without(mode,cpu) (node_cpu_seconds_total{mode="idle"}) > 5000) and rate(node_context_switches_total[1d]) > 0'
        for: '15m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host context switching high (instance {{ $labels.instance }})'
          description: 'Context switching is elevated on the node (more than twice the daily average and above 5000 switches/s per CPU during the last 15m) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostSwapIsFillingUp'
        expr: '((1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) * 100 > 80) and node_memory_SwapTotal_bytes > 0'
        for: '2m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host swap is filling up (instance {{ $labels.instance }})'
          description: 'Swap is filling up (>80%) VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostPhysicalComponentTooHot'
        expr: 'node_hwmon_temp_celsius > node_hwmon_temp_max_celsius'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host physical component too hot (instance {{ $labels.instance }})'
          description: 'Physical hardware component too hot VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostNodeOvertemperatureAlarm'
        expr: '((node_hwmon_temp_crit_alarm_celsius == 1) or (node_hwmon_temp_alarm == 1))'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Host node overtemperature alarm (instance {{ $labels.instance }})'
          description: 'Physical node temperature alarm triggered VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostSoftwareRAIDInsufficientDrives'
        expr: '((node_md_disks_required - ignoring(state) node_md_disks{state="active"}) > 0)'
        for: '0m'
        labels:
          severity: 'critical'
        annotations:
          summary: 'Host software RAID insufficient drives (instance {{ $labels.instance }})'
          description: 'MD RAID array {{ $labels.device }} on {{ $labels.instance }} has insufficient drives remaining. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostSoftwareRAIDDiskFailure'
        expr: '(node_md_disks{state="failed"} > 0)'
        for: '2m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host software RAID disk failure (instance {{ $labels.instance }})'
          description: 'MD RAID array {{ $labels.device }} on {{ $labels.instance }} needs attention. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostOOMKillDetected'
        expr: '(delta(node_vmstat_oom_kill[30m]) > 0)'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host OOM kill detected (instance {{ $labels.instance }})'
          description: 'OOM kill detected VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostEDACCorrectableErrorsDetected'
        expr: '(increase(node_edac_correctable_errors_total[1h]) > 10)'
        for: '0m'
        labels:
          severity: 'info'
        annotations:
          summary: 'Host EDAC Correctable Errors detected (instance {{ $labels.instance }})'
          description: 'Host {{ $labels.instance }} has had {{ printf "%.0f" $value }} correctable memory errors reported by EDAC in the last hour. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostEDACUncorrectableErrorsDetected'
        expr: '(node_edac_uncorrectable_errors_total > 0)'
        for: '0m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host EDAC Uncorrectable Errors detected (instance {{ $labels.instance }})'
          description: 'Host {{ $labels.instance }} has had {{ printf "%.0f" $value }} uncorrectable memory errors reported by EDAC. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostNetworkReceiveErrors'
        expr: '(rate(node_network_receive_errs_total[5m]) / rate(node_network_receive_packets_total[5m]) > 0.01) and rate(node_network_receive_packets_total[5m]) > 10'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host Network Receive Errors (instance {{ $labels.instance }})'
          description: 'Host {{ $labels.instance }} interface {{ $labels.device }} has sustained receive errors. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostNetworkTransmitErrors'
        expr: '(rate(node_network_transmit_errs_total[5m]) / rate(node_network_transmit_packets_total[5m]) > 0.01) and rate(node_network_transmit_packets_total[5m]) > 10'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host Network Transmit Errors (instance {{ $labels.instance }})'
          description: 'Host {{ $labels.instance }} interface {{ $labels.device }} has sustained transmit errors. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostNetworkBondDegraded'
        expr: '((node_bonding_active - node_bonding_slaves) != 0)'
        for: '2m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host Network Bond Degraded (instance {{ $labels.instance }})'
          description: 'Bond "{{ $labels.device }}" degraded on "{{ $labels.instance }}". VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostConntrackLimit'
        expr: '(node_nf_conntrack_entries / node_nf_conntrack_entries_limit > 0.8) and node_nf_conntrack_entries_limit > 0'
        for: '5m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host conntrack limit (instance {{ $labels.instance }})'
          description: 'The number of conntrack is approaching limit VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostClockSkew'
        expr: '((node_timex_offset_seconds > 0.05 and deriv(node_timex_offset_seconds[5m]) >= 0) or (node_timex_offset_seconds < -0.05 and deriv(node_timex_offset_seconds[5m]) <= 0))'
        for: '10m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host clock skew (instance {{ $labels.instance }})'
          description: 'Clock skew detected. Clock is out of sync. Ensure NTP is configured correctly on this host. VALUE = {{ $value }} LABELS = {{ $labels }}'
      - alert: 'HostClockNotSynchronising'
        expr: '(min_over_time(node_timex_sync_status[1m]) == 0 and node_timex_maxerror_seconds >= 16)'
        for: '2m'
        labels:
          severity: 'warning'
        annotations:
          summary: 'Host clock not synchronising (instance {{ $labels.instance }})'
          description: 'Clock not synchronising. Ensure NTP is configured on this host. VALUE = {{ $value }} LABELS = {{ $labels }}'
