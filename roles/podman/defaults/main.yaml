---
podman_available_containers:
  - 'haproxy'
  - 'kanidm'
  - 'ente'
  - 'vaultwarden'
  - 'seedvault'
  - 'stalwart'
  - 'monitoring'

podman_stalwart_ipv4: '10.89.103.2'
podman_stalwart_ipv6: 'fd89:103::2'
podman_stalwart_egress_ipv4: '10.89.111.2'
podman_stalwart_egress_ipv6: 'fd89:111::2'
podman_stalwart_metrics_ipv6: 'fd89:116::2'
podman_prometheus_stalwart_metrics_ipv6: 'fd89:116::3'
podman_stalwart_metrics_port: '8080'
podman_stalwart_gateway_egress_table: '252'
podman_wireguard_ipv6_prefix: 'fd66:66::'
podman_wireguard_gateway_ipv6: 'fd66:66::1'
podman_local_ingress_ipv4: ''
podman_local_ingress_ipv6: ''
podman_local_source_ipv4_cidrs: []
podman_local_source_ipv6_cidrs: []
podman_gvisor_dcache_size: '5000'
podman_gvisor_thp_shmem_enabled: 'advise'
podman_crowdsec_ipv4: '10.89.106.2'
podman_crowdsec_ipv6: 'fd89:106::2'
podman_crowdsec_metrics_port: '6060'
podman_crowdsec_spoa_ipv4: '10.89.106.3'
podman_crowdsec_spoa_ipv6: 'fd89:106::3'
podman_crowdsec_spoa_metrics_port: '60601'
podman_haproxy_crowdsec_ipv4: '10.89.106.4'
podman_haproxy_crowdsec_ipv6: 'fd89:106::4'
podman_haproxy_ingress_ipv4: '10.89.114.10'
podman_haproxy_ingress_ipv6: 'fd89:114::10'
podman_haproxy_metrics_port: '8405'
podman_grafana_image: 'docker.io/grafana/grafana:12.4.0'
podman_certbot_image: '{{ "docker.io/certbot/certbot:v5.5.0@sha256:"
  ~ "78a7eaa40af657301e25731297b6e73646c695370d17e9bb03189fa82966d65c" }}'
podman_prometheus_image: '{{ "quay.io/prometheus/prometheus:v3.11.2@sha256:"
  ~ "cd37346c974517be59bd528c43cfff51727fb75393df0ad8d10ce10013a047b6" }}'
podman_alertmanager_image: '{{ "quay.io/prometheus/alertmanager:v0.32.0@sha256:"
  ~ "58e117eabccebbff04e6643a3432d6315a2cc3a8c24ab5849bc628886bf08857" }}'

podman_haproxy_networks:
  kanidm:
    resolver: '10.89.100.1'
    alias: 'kanidm'
    ipv4: '10.89.100.2'
    ipv6: 'fd89:100::2'
    proxy_ipv6: 'fd89:100::10'
  vaultwarden:
    resolver: '10.89.101.1'
    alias: 'vaultwarden'
    ipv4: '10.89.101.2'
    ipv6: 'fd89:101::2'
    proxy_ipv6: 'fd89:101::10'
  stalwart:
    resolver: '10.89.103.1'
    alias: 'stalwart'
    ipv4: '{{ podman_stalwart_ipv4 }}'
    ipv6: '{{ podman_stalwart_ipv6 }}'
    proxy_ipv6: 'fd89:103::10'
  ente:
    resolver: '10.89.109.1'
    alias: 'ente-museum'
    ipv4: '10.89.109.2'
    ipv6: 'fd89:109::2'
    s3_alias: 'ente-garage'
    s3_ipv4: '10.89.109.3'
    s3_ipv6: 'fd89:109::3'
    web_alias: 'ente-web'
    web_ipv4: '10.89.109.4'
    web_ipv6: 'fd89:109::4'
    proxy_ipv6: 'fd89:109::10'
  seedvault:
    resolver: '10.89.110.1'
    alias: 'seedvault'
    ipv4: '10.89.110.2'
    ipv6: 'fd89:110::2'
    proxy_ipv6: 'fd89:110::10'
  prometheus:
    resolver: '10.89.112.1'
    alias: 'prometheus'
    ipv4: '10.89.112.2'
    ipv6: 'fd89:112::2'
    proxy_ipv6: 'fd89:112::10'
  alertmanager:
    resolver: '10.89.113.1'
    alias: 'alertmanager'
    ipv4: '10.89.113.2'
    ipv6: 'fd89:113::2'
    proxy_ipv6: 'fd89:113::10'
  grafana:
    resolver: '10.89.117.1'
    alias: 'grafana'
    ipv4: '10.89.117.2'
    ipv6: 'fd89:117::2'
    proxy_ipv6: 'fd89:117::10'
