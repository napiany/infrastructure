---
- name: 'Set Stalwart values'
  vars:
    stalwart_settings: '{{ (podman_services | default({})).get(''stalwart'', {}) }}'
  ansible.builtin.set_fact:
    stalwart_certificate_blocks: '{{ stalwart_settings.certificate_blocks | default(([{''domains'': stalwart_settings.domains}] if (stalwart_settings.domains | default([]) | length > 0) else [])) }}'
    stalwart_primary_domain: '{{ ((stalwart_settings.certificate_blocks | default(([{''domains'': stalwart_settings.domains}] if (stalwart_settings.domains | default([]) | length > 0) else [])) | first).domains | default([]) | first) | default('''') }}'
    stalwart_quadlets:
      - src: 'stalwart/haproxy-stalwart.network'
        dest: 'haproxy-stalwart.network'
        restart_units:
          - 'haproxy.service'
          - 'stalwart.service'
      - src: 'stalwart/stalwart-egress.network'
        dest: 'stalwart-egress.network'
        restart_units:
          - 'stalwart.service'
      - src: 'stalwart/stalwart-postgres.network'
        dest: 'stalwart-postgres.network'
        restart_units:
          - 'stalwart-postgres.service'
          - 'stalwart.service'
      - src: 'stalwart/stalwart-postgres.container'
        dest: 'stalwart-postgres.container'
        restart_units:
          - 'stalwart-postgres.service'
    stalwart_secrets:
      - name: 'stalwart-postgres_password'
        value_var: 'vault_podman_secret_stalwart_postgres_password'
        restart_units:
          - 'stalwart-postgres.service'
          - 'stalwart.service'
      - name: 'stalwart_adminsecret'
        value_var: 'vault_podman_secret_stalwart_adminsecret'
        restart_units:
          - 'stalwart.service'
    stalwart_volumes:
      - name: 'stalwart-postgres'
        uid: '300007'
        gid: '300007'
      - name: 'stalwart'
        uid: '300006'
        gid: '300006'

- name: 'Manage Stalwart secrets'
  ansible.builtin.include_tasks: 'helpers/secret.yaml'
  vars:
    podman_secret: '{{ item }}'
  loop: '{{ stalwart_secrets }}'
  loop_control:
    label: '{{ item.name }}'

- name: 'Copy Stalwart Quadlets'
  ansible.builtin.include_tasks: 'helpers/quadlets.yaml'
  vars:
    podman_quadlet_files: '{{ stalwart_quadlets }}'

- name: 'Apply pending Podman network changes before starting Stalwart services'
  ansible.builtin.meta: 'flush_handlers'

- name: 'Create Stalwart volumes'
  ansible.builtin.include_tasks: 'helpers/volume.yaml'
  vars:
    podman_volume: '{{ item }}'
  loop: '{{ stalwart_volumes }}'
  loop_control:
    label: '{{ item.name }}'

- name: 'Configure Stalwart'
  ansible.builtin.include_tasks: 'stalwart/config.yaml'

- name: 'Start Stalwart services'
  ansible.builtin.include_tasks: 'stalwart/runtime.yaml'

- name: 'Issue the Stalwart certificates'
  ansible.builtin.include_tasks: 'stalwart/certificates.yaml'
