---
- name: 'Set HAProxy values'
  vars:
    podman_wireguard_local_ipv6_value: '{{ podman_wireguard_ipv6_prefix ~ (podman_wireguard_ip.split(".")[-1]) }}'
    podman_local_ingress_ipv6_value: '{{ podman_local_ingress_ipv6 | default("") | trim }}'
    podman_local_source_ipv4_cidrs_value: '{{ podman_local_source_ipv4_cidrs if (podman_local_source_ipv4_cidrs | length) > 0 else ["127.0.0.0/8", (podman_wireguard_ip | regex_replace("\\.[0-9]+$", ".0")) ~ "/24"] }}'
    podman_local_source_ipv6_cidrs_value: '{{ podman_local_source_ipv6_cidrs if (podman_local_source_ipv6_cidrs | length) > 0 else ["::1/128", podman_wireguard_ipv6_prefix ~ "/64"] }}'
  ansible.builtin.set_fact:
    podman_local_wireguard_ipv6: '{{ podman_wireguard_local_ipv6_value }}'
    podman_local_ingress_ipv6: '{{ podman_local_ingress_ipv6_value }}'
    podman_local_source_ipv4_cidrs_effective: '{{ podman_local_source_ipv4_cidrs_value }}'
    podman_local_source_ipv6_cidrs_effective: '{{ podman_local_source_ipv6_cidrs_value }}'
    haproxy_service_networks:
      - service: 'kanidm'
        src: 'kanidm/haproxy-kanidm.network'
        dest: 'haproxy-kanidm.network'
        restart_units:
          - 'haproxy.service'
          - 'kanidm.service'
      - service: 'vaultwarden'
        src: 'vaultwarden/haproxy-vaultwarden.network'
        dest: 'haproxy-vaultwarden.network'
        restart_units:
          - 'haproxy.service'
          - 'vaultwarden.service'
      - service: 'seedvault'
        src: 'seedvault/haproxy-seedvault.network'
        dest: 'haproxy-seedvault.network'
        restart_units:
          - 'haproxy.service'
          - 'seedvault.service'
      - service: 'grid'
        src: 'grid/haproxy-grid.network'
        dest: 'haproxy-grid.network'
        restart_units:
          - 'haproxy.service'
          - 'grid.service'
      - service: 'ente'
        src: 'ente/haproxy-ente.network'
        dest: 'haproxy-ente.network'
        restart_units:
          - 'haproxy.service'
          - 'ente-garage.service'
          - 'ente-museum.service'
          - 'ente-web.service'
      - service: 'stalwart'
        src: 'stalwart/haproxy-stalwart.network'
        dest: 'haproxy-stalwart.network'
        restart_units:
          - 'haproxy.service'
          - 'stalwart.service'
      - service: 'autopush'
        src: 'autopush/haproxy-autopush.network'
        dest: 'haproxy-autopush.network'
        restart_units:
          - 'haproxy.service'
          - 'autoconnect.service'
          - 'autoendpoint.service'
      - service: 'mollysocket'
        src: 'mollysocket/haproxy-mollysocket.network'
        dest: 'haproxy-mollysocket.network'
        restart_units:
          - 'haproxy.service'
          - 'mollysocket.service'

- name: 'Validate HAProxy listener addresses'
  ansible.builtin.assert:
    that:
      - 'podman_wireguard_ip | default("") | length > 0'
      - 'podman_local_ingress_ipv6 | length == 0 or podman_local_ingress_ipv6 in (ansible_facts.get("all_ipv6_addresses", []))'
      - "(vault_wireguard_private_keys | default({})).get(inventory_hostname, '') | length > 0"
      - "(vault_wireguard_public_keys | default({})).get('gateway', '') | length > 0"
      - "(vault_wireguard_preshared_keys | default({})).get(inventory_hostname, '') | length > 0"
      - "lookup('vars', 'vault_certbot_dns_desec_ini', default='') | length > 0"
    fail_msg: 'Missing HAProxy listener, WireGuard, or certbot configuration.'
  no_log: true

- name: 'Copy HAProxy service networks'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'quadlets'
    podman_quadlet_files: '{{ haproxy_service_networks | selectattr("service", "in", podman_containers_selected | difference(["haproxy"])) | list }}'

- name: 'Create /etc/wireguard'
  ansible.builtin.file:
    path: '/etc/wireguard'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0700'

- name: 'Render WireGuard client config'
  ansible.builtin.template:
    src: 'wireguard/wireguard-client.conf.j2'
    dest: '/etc/wireguard/wg0.conf'
    owner: 'root'
    group: 'root'
    mode: '0600'
  notify:
    - 'Restart wireguard'

- name: 'Start WireGuard'
  ansible.builtin.systemd:
    name: 'wg-quick@wg0.service'
    state: 'started'
    enabled: true

- name: 'Copy haproxy.build'
  ansible.builtin.copy:
    src: 'haproxy/haproxy.build'
    dest: '/etc/containers/systemd/haproxy.build'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_build_unit'
  notify:
    - 'Daemon reload'

- name: 'Copy haproxy Containerfile'
  ansible.builtin.copy:
    src: 'haproxy/haproxy.containerfile'
    dest: '/etc/containers/systemd/haproxy.containerfile'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_containerfile_file'
  notify:
    - 'Daemon reload'

- name: 'Render haproxy.container'
  ansible.builtin.template:
    src: 'haproxy/haproxy.container.j2'
    dest: '/etc/containers/systemd/haproxy.container'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_container_unit'
  notify:
    - 'Daemon reload'
    - 'Restart haproxy'

- name: 'Copy certbot.build'
  ansible.builtin.copy:
    src: 'certbot/certbot.build'
    dest: '/etc/containers/systemd/certbot.build'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'certbot_build_unit'
  notify:
    - 'Daemon reload'

- name: 'Copy certbot Containerfile'
  ansible.builtin.copy:
    src: 'certbot/certbot.containerfile'
    dest: '/etc/containers/systemd/certbot.containerfile'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'certbot_containerfile_file'
  notify:
    - 'Daemon reload'

- name: 'Render certbot.container'
  ansible.builtin.template:
    src: 'certbot/certbot.container.j2'
    dest: '/etc/containers/systemd/certbot.container'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'certbot_container_unit'
  notify:
    - 'Daemon reload'
    - 'Restart certbot timer'

- name: 'Copy certbot.timer'
  ansible.builtin.copy:
    src: 'certbot/certbot.timer'
    dest: '/etc/systemd/system/certbot.timer'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'certbot_timer_unit'
  notify:
    - 'Daemon reload'
    - 'Restart certbot timer'

- name: 'Create the certbot-config volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'certbot-config'
      uid: '0'
      gid: '0'
      mode: '0755'

- name: 'Create the haproxy-config volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'haproxy-config'
      uid: '300019'
      gid: '300019'
      mode: '0750'
      recurse: true

- name: 'Create the certbot volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'certbot'
      uid: '0'
      gid: '0'
      mode: '0755'

- name: 'Set HAProxy and certbot mount points'
  ansible.builtin.set_fact:
    certbot_config_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("certbot-config", "") }}'
    haproxy_config_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("haproxy-config", "") }}'
    certbot_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("certbot", "") }}'

- name: 'Render the certbot deploy hook'
  ansible.builtin.template:
    src: 'certbot/certbot-deploy-hook.sh.j2'
    dest: '{{ certbot_config_mountpoint }}/certbot-deploy-hook.sh'
    owner: 'root'
    group: 'root'
    mode: '0755'
  when: 'certbot_config_mountpoint | length > 0'

- name: 'Create certbot directories'
  ansible.builtin.file:
    path: '{{ certbot_mountpoint }}/{{ item.path }}'
    state: 'directory'
    owner: '{{ item.owner }}'
    group: '{{ item.group }}'
    mode: '{{ item.mode }}'
  loop:
    - path: 'ansible'
      owner: 'root'
      group: 'root'
      mode: '0700'
    - path: 'secrets'
      owner: 'root'
      group: 'root'
      mode: '0700'
    - path: 'consumers'
      owner: 'root'
      group: 'root'
      mode: '0755'
    - path: 'consumers/haproxy'
      owner: '300019'
      group: '300019'
      mode: '0700'
  when: 'certbot_mountpoint | length > 0'

- name: 'Copy deSEC credentials into the certbot volume'
  ansible.builtin.copy:
    dest: '{{ certbot_mountpoint }}/secrets/DESEC.ini'
    content: '{{ lookup("vars", "vault_certbot_dns_desec_ini") }}'
    owner: 'root'
    group: 'root'
    mode: '0600'
  no_log: true
  when: 'certbot_mountpoint | length > 0'

- name: 'Copy the CrowdSec SPOE config'
  ansible.builtin.copy:
    src: 'haproxy/crowdsec.cfg'
    dest: '{{ haproxy_config_mountpoint }}/crowdsec.cfg'
    owner: '300019'
    group: '300019'
    mode: '0644'
  when: 'haproxy_config_mountpoint | length > 0'
  notify:
    - 'Restart haproxy'

- name: 'Render haproxy.cfg'
  ansible.builtin.template:
    src: 'haproxy/haproxy.cfg.j2'
    dest: '{{ haproxy_config_mountpoint }}/haproxy.cfg'
    owner: '300019'
    group: '300019'
    mode: '0644'
  when: 'haproxy_config_mountpoint | length > 0'
  notify:
    - 'Restart haproxy'

- name: 'Reload systemd before Podman image builds'
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - 'certbot_build_unit.changed or certbot_containerfile_file.changed or certbot_container_unit.changed or haproxy_build_unit.changed or haproxy_containerfile_file.changed or haproxy_container_unit.changed'

- name: 'Build the certbot image'
  ansible.builtin.command:
    argv:
      - 'systemctl'
      - 'restart'
      - '--wait'
      - 'certbot-build.service'
  register: 'certbot_build_start'
  changed_when: 'certbot_build_start.rc == 0'
  when: 'certbot_build_unit.changed or certbot_containerfile_file.changed or certbot_container_unit.changed'

- name: 'Build the haproxy image'
  ansible.builtin.command:
    argv:
      - 'systemctl'
      - 'restart'
      - '--wait'
      - 'haproxy-build.service'
  register: 'haproxy_build_start'
  changed_when: 'haproxy_build_start.rc == 0'
  when: 'haproxy_build_unit.changed or haproxy_containerfile_file.changed or haproxy_container_unit.changed'

- name: 'Start certbot.timer'
  ansible.builtin.systemd:
    name: 'certbot.timer'
    state: 'started'
    enabled: true
    daemon_reload: true
