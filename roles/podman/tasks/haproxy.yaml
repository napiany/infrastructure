---
- name: 'Set HAProxy values'
  vars:
    podman_wireguard_local_ipv6_value: '{{ podman_wireguard_ipv6_prefix ~ (podman_wireguard_ip.split(".")[-1]) }}'
    podman_local_ingress_ipv6_value: '{{ podman_local_ingress_ipv6 | default("") | trim }}'
    podman_local_source_ipv4_cidrs_value: '{{ ((podman_local_source_ipv4_cidrs | default([])) + ["127.0.0.0/8", (podman_wireguard_ip | regex_replace("\\.[0-9]+$", ".0")) ~ "/24", "10.89.0.0/16"]) | unique }}'
    podman_local_source_ipv6_cidrs_value: '{{ ((podman_local_source_ipv6_cidrs | default([])) + ["::1/128", podman_wireguard_ipv6_prefix ~ "/64", "fd89::/16"]) | unique }}'
  ansible.builtin.set_fact:
    podman_local_wireguard_ipv6: '{{ podman_wireguard_local_ipv6_value }}'
    podman_local_ingress_ipv6: '{{ podman_local_ingress_ipv6_value }}'
    podman_local_source_ipv4_cidrs_effective: '{{ podman_local_source_ipv4_cidrs_value }}'
    podman_local_source_ipv6_cidrs_effective: '{{ podman_local_source_ipv6_cidrs_value }}'
    haproxy_service_networks:
      - service: 'kanidm'
        src: 'kanidm/haproxy-kanidm.network'
        dest: 'haproxy-kanidm.network'
        restart_units:
          - 'haproxy.service'
          - 'kanidm.service'
      - service: 'vaultwarden'
        src: 'vaultwarden/haproxy-vaultwarden.network'
        dest: 'haproxy-vaultwarden.network'
        restart_units:
          - 'haproxy.service'
          - 'vaultwarden.service'
      - service: 'seedvault'
        src: 'seedvault/haproxy-seedvault.network'
        dest: 'haproxy-seedvault.network'
        restart_units:
          - 'haproxy.service'
          - 'seedvault.service'
      - service: 'grid'
        src: 'grid/haproxy-grid.network'
        dest: 'haproxy-grid.network'
        restart_units:
          - 'haproxy.service'
          - 'grid.service'
      - service: 'ente'
        src: 'ente/haproxy-ente.network'
        dest: 'haproxy-ente.network'
        restart_units:
          - 'haproxy.service'
          - 'ente-garage.service'
          - 'ente-museum.service'
          - 'ente-web.service'
      - service: 'stalwart'
        src: 'stalwart/haproxy-stalwart.network'
        dest: 'haproxy-stalwart.network'
        restart_units:
          - 'haproxy.service'
          - 'stalwart.service'
      - service: 'autopush'
        src: 'autopush/haproxy-autopush.network'
        dest: 'haproxy-autopush.network'
        restart_units:
          - 'haproxy.service'
          - 'autoconnect.service'
          - 'autoendpoint.service'
      - service: 'mollysocket'
        src: 'mollysocket/haproxy-mollysocket.network'
        dest: 'haproxy-mollysocket.network'
        restart_units:
          - 'haproxy.service'
          - 'mollysocket.service'

- name: 'Validate HAProxy listener addresses'
  ansible.builtin.assert:
    that:
      - 'podman_wireguard_ip | default("") | length > 0'
    fail_msg: 'Missing podman_wireguard_ip for HAProxy and WireGuard configuration.'

- name: 'List host IPv6 addresses'
  ansible.builtin.command:
    argv:
      - 'ip'
      - '-j'
      - '-6'
      - 'addr'
      - 'show'
  register: 'podman_host_ipv6_command'
  changed_when: false
  when: 'podman_local_ingress_ipv6 | length > 0'

- name: 'Set host IPv6 addresses'
  ansible.builtin.set_fact:
    podman_host_ipv6_addresses: '{{ ((podman_host_ipv6_command.stdout | default("[]") | from_json) | map(attribute="addr_info") | sum(start=[])) | map(attribute="local") | list }}'
  when: 'podman_local_ingress_ipv6 | length > 0'

- name: 'Validate HAProxy local IPv6 listener address'
  ansible.builtin.assert:
    that:
      - 'podman_local_ingress_ipv6 in (podman_host_ipv6_addresses | default([]))'
    fail_msg: 'podman_local_ingress_ipv6 {{ podman_local_ingress_ipv6 }} is not configured on this host. Detected IPv6 addresses: {{ podman_host_ipv6_addresses | default([]) | join(", ") }}'
  when: 'podman_local_ingress_ipv6 | length > 0'

- name: 'Validate WireGuard private key for this host'
  ansible.builtin.assert:
    that:
      - "(vault_wireguard_private_keys | default({})).get(inventory_hostname, '') | length > 0"
    fail_msg: 'Missing vault_wireguard_private_keys entry for {{ inventory_hostname }}.'

- name: 'Validate WireGuard gateway public key'
  ansible.builtin.assert:
    that:
      - "(vault_wireguard_public_keys | default({})).get('gateway', '') | length > 0"
    fail_msg: "Missing vault_wireguard_public_keys entry for 'gateway'."

- name: 'Validate WireGuard preshared key for this host'
  ansible.builtin.assert:
    that:
      - "(vault_wireguard_preshared_keys | default({})).get(inventory_hostname, '') | length > 0"
    fail_msg: 'Missing vault_wireguard_preshared_keys entry for {{ inventory_hostname }}.'

- name: 'Copy HAProxy service networks'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'quadlets'
    podman_quadlet_files: '{{ haproxy_service_networks | selectattr("service", "in", podman_containers_selected | difference(["haproxy"])) | list }}'

- name: 'Apply pending Podman network changes before starting HAProxy dependencies'
  ansible.builtin.meta: 'flush_handlers'

- name: 'Create /etc/wireguard'
  ansible.builtin.file:
    path: '/etc/wireguard'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0700'

- name: 'Render WireGuard client config'
  ansible.builtin.template:
    src: 'wireguard/wireguard-client.conf.j2'
    dest: '/etc/wireguard/wg0.conf'
    owner: 'root'
    group: 'root'
    mode: '0600'
  notify:
    - 'Restart wireguard'

- name: 'Start WireGuard'
  ansible.builtin.systemd:
    name: 'wg-quick@wg0.service'
    state: 'started'
    enabled: true

- name: 'Copy haproxy.build'
  ansible.builtin.copy:
    src: 'haproxy/haproxy.build'
    dest: '/etc/containers/systemd/haproxy.build'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_build_unit'
  notify:
    - 'Daemon reload'

- name: 'Copy haproxy Containerfile'
  ansible.builtin.copy:
    src: 'haproxy/haproxy.containerfile'
    dest: '/etc/containers/systemd/haproxy.containerfile'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_containerfile_file'
  notify:
    - 'Daemon reload'

- name: 'Render haproxy.container'
  ansible.builtin.template:
    src: 'haproxy/haproxy.container.j2'
    dest: '/etc/containers/systemd/haproxy.container'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_container_unit'
  notify:
    - 'Daemon reload'
    - 'Restart haproxy'

- name: 'Render certbot.container'
  ansible.builtin.template:
    src: 'certbot/certbot.container.j2'
    dest: '/etc/containers/systemd/certbot.container'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'certbot_container_unit'
  notify:
    - 'Daemon reload'
    - 'Restart certbot timer'

- name: 'Copy certbot.timer'
  ansible.builtin.copy:
    src: 'certbot/certbot.timer'
    dest: '/etc/systemd/system/certbot.timer'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'certbot_timer_unit'
  notify:
    - 'Daemon reload'
    - 'Restart certbot timer'

- name: 'Create the certbot-config volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'certbot-config'
      uid: '0'
      gid: '0'
      mode: '0755'

- name: 'Create the haproxy-config volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'haproxy-config'
      uid: '300019'
      gid: '300019'
      mode: '0750'
      recurse: true

- name: 'Create the certbot volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'certbot'
      uid: '0'
      gid: '0'
      mode: '0755'

- name: 'Create the certbot-webroot volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'certbot-webroot'
      uid: '0'
      gid: '0'
      mode: '0755'

- name: 'Set HAProxy and certbot mount points'
  ansible.builtin.set_fact:
    certbot_config_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("certbot-config", "") }}'
    haproxy_config_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("haproxy-config", "") }}'
    certbot_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("certbot", "") }}'
    certbot_webroot_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("certbot-webroot", "") }}'

- name: 'Render the certbot deploy hook'
  ansible.builtin.template:
    src: 'certbot/certbot-deploy-hook.sh.j2'
    dest: '{{ certbot_config_mountpoint }}/certbot-deploy-hook.sh'
    owner: 'root'
    group: 'root'
    mode: '0755'
  when: 'certbot_config_mountpoint | length > 0'

- name: 'Create certbot directories'
  ansible.builtin.file:
    path: '{{ item.base }}/{{ item.path }}'
    state: 'directory'
    owner: '{{ item.owner }}'
    group: '{{ item.group }}'
    mode: '{{ item.mode }}'
  loop:
    - path: 'ansible'
      owner: 'root'
      group: 'root'
      mode: '0700'
      base: '{{ certbot_mountpoint }}'
    - path: 'consumers'
      owner: 'root'
      group: 'root'
      mode: '0755'
      base: '{{ certbot_mountpoint }}'
    - path: 'certs'
      owner: '300019'
      group: '300019'
      mode: '0700'
      base: '{{ haproxy_config_mountpoint }}'
    - path: 'session-ticket-keys'
      owner: '300019'
      group: '300019'
      mode: '0700'
      base: '{{ haproxy_config_mountpoint }}'
  when:
    - 'certbot_mountpoint | length > 0'
    - 'haproxy_config_mountpoint | length > 0'

- name: 'Check for existing HAProxy certificate bundles'
  ansible.builtin.find:
    paths: '{{ haproxy_config_mountpoint }}/certs'
    patterns: '*.pem'
    file_type: 'file'
    recurse: false
  register: 'haproxy_certificate_bundle_files'
  when: 'haproxy_config_mountpoint | length > 0'

- name: 'Create HAProxy bootstrap certificate fragment directory'
  ansible.builtin.file:
    path: '{{ haproxy_config_mountpoint }}/certs/bootstrap.d'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0700'
  when:
    - 'haproxy_config_mountpoint | length > 0'
    - '(haproxy_certificate_bundle_files.matched | default(0) | int) == 0'

- name: 'Generate HAProxy bootstrap certificate'
  ansible.builtin.command:
    argv:
      - '/usr/bin/openssl'
      - 'req'
      - '-x509'
      - '-newkey'
      - 'ec'
      - '-pkeyopt'
      - 'ec_paramgen_curve:P-256'
      - '-nodes'
      - '-sha256'
      - '-days'
      - '30'
      - '-subj'
      - '/CN=bootstrap.invalid'
      - '-addext'
      - 'subjectAltName=DNS:bootstrap.invalid'
      - '-keyout'
      - '{{ haproxy_config_mountpoint }}/certs/bootstrap.d/20-key.pem'
      - '-out'
      - '{{ haproxy_config_mountpoint }}/certs/bootstrap.d/10-cert.pem'
  args:
    creates: '{{ haproxy_config_mountpoint }}/certs/bootstrap.d/10-cert.pem'
  when:
    - 'haproxy_config_mountpoint | length > 0'
    - '(haproxy_certificate_bundle_files.matched | default(0) | int) == 0'

- name: 'Assemble HAProxy bootstrap certificate bundle'
  ansible.builtin.assemble:
    src: '{{ haproxy_config_mountpoint }}/certs/bootstrap.d'
    dest: '{{ haproxy_config_mountpoint }}/certs/000-bootstrap.pem'
    owner: '300019'
    group: '300019'
    mode: '0400'
  when:
    - 'haproxy_config_mountpoint | length > 0'
    - '(haproxy_certificate_bundle_files.matched | default(0) | int) == 0'

- name: 'Create certbot ACME webroot directories'
  ansible.builtin.file:
    path: '{{ certbot_webroot_mountpoint }}/{{ item }}'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'
  loop:
    - '.well-known'
    - '.well-known/acme-challenge'
  when: 'certbot_webroot_mountpoint | length > 0'

- name: 'Create /usr/local/libexec'
  ansible.builtin.file:
    path: '/usr/local/libexec'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: 'Render HAProxy TLS ticket create script'
  ansible.builtin.template:
    src: 'haproxy/session-ticket-keys-create.j2'
    dest: '/usr/local/libexec/haproxy-session-ticket-keys-create'
    owner: 'root'
    group: 'root'
    mode: '0755'
  when: 'haproxy_config_mountpoint | length > 0'

- name: 'Render HAProxy TLS ticket rotate script'
  ansible.builtin.template:
    src: 'haproxy/session-ticket-keys-rotate.j2'
    dest: '/usr/local/libexec/haproxy-session-ticket-keys-rotate'
    owner: 'root'
    group: 'root'
    mode: '0755'
  when: 'haproxy_config_mountpoint | length > 0'

- name: 'Render HAProxy TLS ticket key creation service'
  ansible.builtin.template:
    src: 'haproxy/haproxy-create-tls-ticket-keys.service.j2'
    dest: '/etc/systemd/system/haproxy-create-tls-ticket-keys.service'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_tls_ticket_create_service_unit'
  notify:
    - 'Daemon reload'

- name: 'Check current HAProxy TLS ticket key file'
  ansible.builtin.stat:
    path: '{{ haproxy_config_mountpoint }}/session-ticket-keys/keys'
  register: 'haproxy_tls_ticket_key_file'
  when: 'haproxy_config_mountpoint | length > 0'

- name: 'Initialize HAProxy TLS ticket keys'
  ansible.builtin.systemd:
    name: 'haproxy-create-tls-ticket-keys.service'
    state: 'started'
    daemon_reload: true
  when:
    - 'haproxy_config_mountpoint | length > 0'
    - 'not (haproxy_tls_ticket_key_file.stat.exists | default(false))'

- name: 'Render HAProxy TLS ticket rotation service'
  ansible.builtin.template:
    src: 'haproxy/haproxy-rotate-tls-ticket-keys.service.j2'
    dest: '/etc/systemd/system/haproxy-rotate-tls-ticket-keys.service'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_tls_ticket_rotate_service_unit'
  notify:
    - 'Daemon reload'

- name: 'Copy HAProxy TLS ticket rotation timer'
  ansible.builtin.copy:
    src: 'haproxy/haproxy-rotate-tls-ticket-keys.timer'
    dest: '/etc/systemd/system/haproxy-rotate-tls-ticket-keys.timer'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_tls_ticket_rotate_timer_unit'
  notify:
    - 'Daemon reload'

- name: 'Copy the CrowdSec SPOE config'
  ansible.builtin.copy:
    src: 'haproxy/crowdsec.cfg'
    dest: '{{ haproxy_config_mountpoint }}/crowdsec.cfg'
    owner: '300019'
    group: '300019'
    mode: '0644'
  when: 'haproxy_config_mountpoint | length > 0'
  notify:
    - 'Restart haproxy'

- name: 'Render haproxy.cfg'
  ansible.builtin.template:
    src: 'haproxy/haproxy.cfg.j2'
    dest: '{{ haproxy_config_mountpoint }}/haproxy.cfg'
    owner: '300019'
    group: '300019'
    mode: '0644'
  when: 'haproxy_config_mountpoint | length > 0'
  notify:
    - 'Restart haproxy'

- name: 'Render ACME HTTP-01 Lua handler'
  ansible.builtin.template:
    src: 'haproxy/acme-http01.lua.j2'
    dest: '{{ haproxy_config_mountpoint }}/acme-http01.lua'
    owner: '300019'
    group: '300019'
    mode: '0644'
  when: 'haproxy_config_mountpoint | length > 0'
  notify:
    - 'Restart haproxy'

- name: 'Reload systemd before Podman image builds'
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - 'haproxy_build_unit.changed or haproxy_containerfile_file.changed or haproxy_container_unit.changed'

- name: 'Build the haproxy image'
  ansible.builtin.command:
    argv:
      - 'systemctl'
      - 'restart'
      - '--wait'
      - 'haproxy-build.service'
  register: 'haproxy_build_start'
  changed_when: 'haproxy_build_start.rc == 0'
  when: 'haproxy_build_unit.changed or haproxy_containerfile_file.changed or haproxy_container_unit.changed'

- name: 'Start certbot.timer'
  ansible.builtin.systemd:
    name: 'certbot.timer'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Start haproxy-tls-ticket-rotate.timer'
  ansible.builtin.systemd:
    name: 'haproxy-rotate-tls-ticket-keys.timer'
    state: 'started'
    enabled: true
    daemon_reload: true
