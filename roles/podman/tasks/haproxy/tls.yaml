---
- name: 'Check for existing HAProxy certificate bundles'
  ansible.builtin.find:
    paths: '{{ haproxy_config_mountpoint }}/certs'
    patterns: '*.pem'
    file_type: 'file'
    recurse: false
  register: 'haproxy_certificate_bundle_files'
  when: 'haproxy_config_mountpoint | length > 0'

- name: 'Create HAProxy bootstrap certificate fragment directory'
  ansible.builtin.file:
    path: '{{ haproxy_config_mountpoint }}/certs/bootstrap.d'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0700'
  when:
    - 'haproxy_config_mountpoint | length > 0'
    - '(haproxy_certificate_bundle_files.matched | default(0) | int) == 0'

- name: 'Generate HAProxy bootstrap certificate'
  ansible.builtin.command:
    argv:
      - '/usr/bin/openssl'
      - 'req'
      - '-x509'
      - '-newkey'
      - 'ec'
      - '-pkeyopt'
      - 'ec_paramgen_curve:P-256'
      - '-nodes'
      - '-sha256'
      - '-days'
      - '30'
      - '-subj'
      - '/CN=bootstrap.invalid'
      - '-addext'
      - 'subjectAltName=DNS:bootstrap.invalid'
      - '-keyout'
      - '{{ haproxy_config_mountpoint }}/certs/bootstrap.d/20-key.pem'
      - '-out'
      - '{{ haproxy_config_mountpoint }}/certs/bootstrap.d/10-cert.pem'
  args:
    creates: '{{ haproxy_config_mountpoint }}/certs/bootstrap.d/10-cert.pem'
  when:
    - 'haproxy_config_mountpoint | length > 0'
    - '(haproxy_certificate_bundle_files.matched | default(0) | int) == 0'

- name: 'Assemble HAProxy bootstrap certificate bundle'
  ansible.builtin.assemble:
    src: '{{ haproxy_config_mountpoint }}/certs/bootstrap.d'
    dest: '{{ haproxy_config_mountpoint }}/certs/000-bootstrap.pem'
    owner: '300019'
    group: '300019'
    mode: '0400'
  when:
    - 'haproxy_config_mountpoint | length > 0'
    - '(haproxy_certificate_bundle_files.matched | default(0) | int) == 0'

- name: 'Render HAProxy TLS ticket key creation service'
  ansible.builtin.template:
    src: 'haproxy/haproxy-create-tls-ticket-keys.service.j2'
    dest: '/etc/systemd/system/haproxy-create-tls-ticket-keys.service'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_tls_ticket_create_service_unit'
  notify:
    - 'Daemon reload'

- name: 'Check current HAProxy TLS ticket key file'
  ansible.builtin.stat:
    path: '{{ haproxy_config_mountpoint }}/session-ticket-keys/keys'
  register: 'haproxy_tls_ticket_key_file'
  when: 'haproxy_config_mountpoint | length > 0'

- name: 'Initialize HAProxy TLS ticket keys'
  ansible.builtin.systemd:
    name: 'haproxy-create-tls-ticket-keys.service'
    state: 'started'
    daemon_reload: true
  when:
    - 'haproxy_config_mountpoint | length > 0'
    - 'not (haproxy_tls_ticket_key_file.stat.exists | default(false))'

- name: 'Render HAProxy TLS ticket rotation service'
  ansible.builtin.template:
    src: 'haproxy/haproxy-rotate-tls-ticket-keys.service.j2'
    dest: '/etc/systemd/system/haproxy-rotate-tls-ticket-keys.service'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_tls_ticket_rotate_service_unit'
  notify:
    - 'Daemon reload'

- name: 'Copy HAProxy TLS ticket rotation timer'
  ansible.builtin.copy:
    src: 'haproxy/haproxy-rotate-tls-ticket-keys.timer'
    dest: '/etc/systemd/system/haproxy-rotate-tls-ticket-keys.timer'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'haproxy_tls_ticket_rotate_timer_unit'
  notify:
    - 'Daemon reload'
