---
- name: 'Set Ente admin user ID'
  ansible.builtin.set_fact:
    ente_admin_user_id: '{{ lookup(''vars'', ''vault_podman_secret_ente_admin_user_id'', default='''') | string | trim }}'
  no_log: true

- name: 'Check whether Ente credentials config exists'
  ansible.builtin.stat:
    path: '{{ ente_config_mountpoint }}/credentials.yaml'
  register: 'ente_credentials_file'
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'

- name: 'Render Ente credentials config'
  ansible.builtin.set_fact:
    ente_credentials_content: '{{ lookup(''template'', ''ente/credentials.yaml.j2'') }}'
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'
  no_log: true

- name: 'Read current Ente credentials config'
  ansible.builtin.slurp:
    src: '{{ ente_config_mountpoint }}/credentials.yaml'
  register: 'ente_credentials_file_raw'
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'
    - 'ente_credentials_file.stat.exists | default(false)'
  no_log: true

- name: 'Write Ente credentials config when content changed'
  ansible.builtin.copy:
    content: '{{ ente_credentials_content }}'
    dest: '{{ ente_config_mountpoint }}/credentials.yaml'
    owner: '300015'
    group: '300015'
    mode: '0600'
    unsafe_writes: true
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'
    - 'not (ente_credentials_file.stat.exists | default(false)) or (ente_credentials_file_raw.content | b64decode) != ente_credentials_content'
  register: 'ente_credentials_written'
  no_log: true

- name: 'Track Ente Museum restart after credential changes'
  ansible.builtin.include_tasks: 'helpers/restart_units.yaml'
  vars:
    podman_restart_units:
      - 'ente-museum.service'
  when:
    - 'ente_credentials_written is defined'
    - 'ente_credentials_written.changed | default(false)'

- name: 'Set Ente credentials config ownership'
  ansible.builtin.file:
    path: '{{ ente_config_mountpoint }}/credentials.yaml'
    owner: '300015'
    group: '300015'
    mode: '0600'
    state: 'file'
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'
  changed_when: false
  no_log: true
