---
- name: 'Install Podman packages'
  community.general.zypper:
    name:
      - 'podman'
      - 'netavark'
      - 'aardvark-dns'
      - 'wireguard-tools'
    state: 'present'
    update_cache: true
  notify:
    - 'Reboot'

- name: 'Apply pending reboot for Podman packages'
  ansible.builtin.meta: 'flush_handlers'

# - name: 'Enable and start podman-auto-update.timer'
#   ansible.builtin.systemd:
#     name: 'podman-auto-update.timer'
#     state: 'started'
#     enabled: true

- name: 'Set effective podman container list'
  ansible.builtin.set_fact:
    podman_containers_selected: '{{ podman_containers | default(podman_available_containers) | unique | list }}'
  tags:
    - 'always'

- name: 'Validate selected podman containers'
  ansible.builtin.assert:
    that:
      - '(podman_containers_selected | difference(podman_available_containers) | length) == 0'
    fail_msg: 'podman_containers contains unsupported services.'
  tags:
    - 'always'

- name: 'Initialize Podman service manifests'
  ansible.builtin.set_fact:
    podman_service_manifests: {}
    podman_cleanup_restartable_units: '{{ [''haproxy.service''] if (''haproxy'' in podman_containers_selected) else [] }}'
  tags:
    - 'always'

- name: 'Include Kanidm manifest tasks'
  ansible.builtin.include_tasks:
    file: 'kanidm/manifest.yaml'
    apply:
      tags:
        - 'podman'
        - 'kanidm'
        - 'monitoring'
  tags:
    - 'podman'
    - 'kanidm'
    - 'monitoring'

