---
- name: 'Refresh zypper metadata for Podman'
  ansible.builtin.command:
    argv:
      - 'zypper'
      - '--non-interactive'
      - 'refresh'
  changed_when: false

- name: 'Install Podman packages'
  community.general.zypper:
    name:
      - 'podman'
      - 'netavark'
      - 'aardvark-dns'
      - 'wireguard-tools'
    state: 'present'
  notify:
    - 'Reboot'

- name: 'Apply pending reboot for Podman packages'
  ansible.builtin.meta: 'flush_handlers'

- name: 'Enable and start podman-auto-update.timer'
  ansible.builtin.systemd:
    name: 'podman-auto-update.timer'
    state: 'started'
    enabled: true

- name: 'Set effective podman container list'
  ansible.builtin.set_fact:
    podman_containers_selected: '{{ podman_containers | default(podman_available_containers) | unique | list }}'

- name: 'Validate selected podman containers'
  ansible.builtin.assert:
    that:
      - '(podman_containers_selected | difference(podman_available_containers) | length) == 0'
    fail_msg: 'podman_containers contains unsupported services.'

- name: 'Include HAProxy tasks'
  ansible.builtin.include_tasks:
    file: 'haproxy.yaml'
    apply:
      tags:
        - 'podman'
        - 'haproxy'
  when: "'haproxy' in podman_containers_selected"
  tags:
    - 'podman'
    - 'haproxy'

- name: 'Include CrowdSec tasks'
  ansible.builtin.include_tasks:
    file: 'crowdsec.yaml'
    apply:
      tags:
        - 'podman'
        - 'crowdsec'
  tags:
    - 'podman'
    - 'crowdsec'

- name: 'Include selected podman service tasks'
  ansible.builtin.include_tasks:
    file: '{{ podman_service_name }}.yaml'
    apply:
      tags:
        - 'podman'
        - '{{ podman_service_name }}'
  loop: '{{ podman_available_containers | difference(["haproxy"]) | select("in", podman_containers_selected) | list }}'
  loop_control:
    loop_var: 'podman_service_name'
  tags:
    - 'always'

- name: 'Include gVisor tasks'
  ansible.builtin.include_tasks:
    file: 'gvisor.yaml'
    apply:
      tags:
        - 'podman'
        - 'gvisor'
  tags:
    - 'podman'
    - 'gvisor'
