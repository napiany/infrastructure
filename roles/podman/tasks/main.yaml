- name: 'Remove deselected Podman services'
  ansible.builtin.include_tasks: 'helpers/service_cleanup.yaml'
  vars:
    podman_service_manifest: '{{ podman_service_manifests[podman_deselected_service] }}'
  loop: '{{ podman_service_manifests.keys() | list | difference(podman_containers_selected) | sort }}'
  loop_control:
    loop_var: 'podman_deselected_service'
    label: '{{ podman_deselected_service }}'
  tags:
    - 'podman'

