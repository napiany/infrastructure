---
- name: 'Create /etc/containers/containers.conf.d'
  ansible.builtin.file:
    path: '/etc/containers/containers.conf.d'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: 'Template Podman gVisor defaults'
  ansible.builtin.template:
    src: 'gvisor/containers.conf.j2'
    dest: '/etc/containers/containers.conf.d/90-gvisor.conf'
    owner: 'root'
    group: 'root'
    mode: '0644'
  register: 'gvisor_defaults_config'

- name: 'Copy gvisor-auto-update.service'
  ansible.builtin.copy:
    src: 'gvisor/auto-update.service'
    dest: '/etc/systemd/system/gvisor-auto-update.service'
    owner: 'root'
    group: 'root'
    mode: '0644'
  notify:
    - 'Daemon reload'

- name: 'Copy gvisor-auto-update.timer'
  ansible.builtin.copy:
    src: 'gvisor/auto-update.timer'
    dest: '/etc/systemd/system/gvisor-auto-update.timer'
    owner: 'root'
    group: 'root'
    mode: '0644'
  notify:
    - 'Daemon reload'

- name: 'Reload systemd after gVisor unit changes'
  ansible.builtin.systemd:
    daemon_reload: true
  when: 'not ansible_check_mode'

- name: 'Check whether runsc is already installed'
  ansible.builtin.stat:
    path: '/usr/local/bin/runsc'
  register: 'gvisor_runsc_binary'

- name: 'Run gvisor-auto-update.service immediately when runsc is missing'
  ansible.builtin.systemd:
    name: 'gvisor-auto-update.service'
    state: 'started'
  when:
    - 'not ansible_check_mode'
    - 'not (gvisor_runsc_binary.stat.exists | default(false))'

- name: 'Wait for runsc to become available'
  ansible.builtin.wait_for:
    path: '/usr/local/bin/runsc'
    state: 'present'
    timeout: 300
  when:
    - 'not ansible_check_mode'
    - 'not (gvisor_runsc_binary.stat.exists | default(false))'

- name: 'Enable and start gvisor-auto-update.timer'
  ansible.builtin.systemd:
    name: 'gvisor-auto-update.timer'
    state: 'started'
    enabled: true
  when: 'not ansible_check_mode'

- name: 'Set KVM kernel modules for gVisor'
  ansible.builtin.set_fact:
    gvisor_kvm_modules: '{{ ["kvm"] + (["kvm_intel"] if "GenuineIntel" in ((ansible_facts["processor"] | default([])) | join(" ")) else ["kvm_amd"] if "AuthenticAMD" in ((ansible_facts["processor"] | default([])) | join(" ")) else []) }}'

- name: 'Try to load KVM kernel modules for gVisor'
  community.general.modprobe:
    name: '{{ item }}'
    state: 'present'
  loop: '{{ gvisor_kvm_modules }}'
  failed_when: false
  changed_when: false
  when: 'not ansible_check_mode'

- name: 'Set gVisor platform'
  ansible.builtin.set_fact:
    gvisor_platform: 'kvm'

- name: 'Persist KVM kernel modules for gVisor'
  ansible.builtin.template:
    src: 'gvisor/kvm-modules-load.conf.j2'
    dest: '/etc/modules-load.d/gvisor-kvm.conf'
    owner: 'root'
    group: 'root'
    mode: '0644'

- name: 'Set gVisor Quadlet units'
  ansible.builtin.set_fact:
    gvisor_quadlet_units: '{{
      ([]
      + (["haproxy", "certbot", "crowdsec-spoa"] if ("haproxy" in podman_containers_selected) else [])
      + (["crowdsec"])
      + (["kanidm"] if "kanidm" in podman_containers_selected else [])
      + (["grid", "grid-postgres"] if "grid" in podman_containers_selected else [])
      + (["ente-museum", "ente-postgres", "ente-web", "ente-garage"] if "ente" in podman_containers_selected else [])
      + (["vaultwarden", "vaultwarden-postgres"] if "vaultwarden" in podman_containers_selected else [])
      + (["seedvault"] if "seedvault" in podman_containers_selected else [])
      + (["stalwart", "stalwart-postgres"] if "stalwart" in podman_containers_selected else [])
      + (["autoconnect", "autoendpoint", "autopush-valkey"] if "autopush" in podman_containers_selected else [])
      + (["mollysocket"] if "mollysocket" in podman_containers_selected else [])
      + (["containercve"] if "containercve" in podman_containers_selected else []))
      | unique }}'

- name: 'Set long-running services using Podman gVisor defaults'
  ansible.builtin.set_fact:
    gvisor_running_service_units: '{{ (gvisor_quadlet_units | default([]) | difference(["certbot"])) | unique }}'

- name: 'Remove stale gVisor platform drop-ins'
  ansible.builtin.file:
    path: '/etc/containers/systemd/{{ item }}.container.d/90-gvisor-platform.conf'
    state: 'absent'
  loop: '{{ gvisor_quadlet_units | default([]) }}'
  register: 'gvisor_platform_dropins_removed'

- name: 'Reload systemd after gVisor platform changes'
  ansible.builtin.systemd:
    daemon_reload: true
  when: '(gvisor_platform_dropins_removed.results | default([]) | selectattr("changed") | list | length) > 0'

- name: 'Restart long-running services after Podman gVisor defaults changes'
  ansible.builtin.systemd:
    name: '{{ item }}.service'
    state: 'restarted'
  loop: '{{ gvisor_running_service_units | default([]) }}'
  when:
    - 'not ansible_check_mode'
    - 'gvisor_defaults_config is defined and gvisor_defaults_config.changed | default(false)'

- name: 'Restart services after gVisor platform changes'
  ansible.builtin.systemd:
    name: '{{ item }}.service'
    state: 'restarted'
    daemon_reload: true
  loop: '{{ gvisor_running_service_units | default([]) }}'
  when:
    - 'not ansible_check_mode'
    - '(gvisor_platform_dropins_removed.results | default([]) | selectattr("changed") | list | length) > 0'
