---
- name: 'Copy gvisor-auto-update.service'
  ansible.builtin.copy:
    src: 'gvisor/auto-update.service'
    dest: '/etc/systemd/system/gvisor-auto-update.service'
    owner: 'root'
    group: 'root'
    mode: '0644'
  notify:
    - 'Daemon reload'

- name: 'Copy gvisor-auto-update.timer'
  ansible.builtin.copy:
    src: 'gvisor/auto-update.timer'
    dest: '/etc/systemd/system/gvisor-auto-update.timer'
    owner: 'root'
    group: 'root'
    mode: '0644'
  notify:
    - 'Daemon reload'

- name: 'Reload systemd after gVisor unit changes'
  ansible.builtin.systemd:
    daemon_reload: true
  when: 'not ansible_check_mode'

- name: 'Check whether runsc is already installed'
  ansible.builtin.stat:
    path: '/usr/local/bin/runsc'
  register: 'gvisor_runsc_binary'

- name: 'Run gvisor-auto-update.service immediately when runsc is missing'
  ansible.builtin.systemd:
    name: 'gvisor-auto-update.service'
    state: 'started'
  when:
    - 'not ansible_check_mode'
    - 'not (gvisor_runsc_binary.stat.exists | default(false))'

- name: 'Wait for runsc to become available'
  ansible.builtin.wait_for:
    path: '/usr/local/bin/runsc'
    state: 'present'
    timeout: 300
  when:
    - 'not ansible_check_mode'
    - 'not (gvisor_runsc_binary.stat.exists | default(false))'

- name: 'Enable and start gvisor-auto-update.timer'
  ansible.builtin.systemd:
    name: 'gvisor-auto-update.timer'
    state: 'started'
    enabled: true
  when: 'not ansible_check_mode'
