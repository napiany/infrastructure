---
- name: 'Manage nginx config for {{ podman_nginx_config_name }}'
  block:
    - name: 'Get nginx-conf volume mount point for {{ podman_nginx_config_name }}'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'volume'
          - 'inspect'
          - 'nginx-conf'
          - '--format'
          - '{{ "{{.Mountpoint}}" }}'
      register: 'podman_nginx_conf_mountpoint'
      changed_when: false
      failed_when: 'not ansible_check_mode and podman_nginx_conf_mountpoint.rc != 0'
      check_mode: false

    - name: 'Copy {{ podman_nginx_config_name }} nginx config files'
      ansible.builtin.copy:
        src: '{{ item.src }}'
        dest: '{{ podman_nginx_conf_mountpoint.stdout }}/{{ item.dest }}'
        owner: 'root'
        group: 'root'
        mode: '0644'
      loop: '{{ podman_nginx_config_copies | default([]) }}'
      when: 'podman_nginx_conf_mountpoint.stdout | default("") | trim | length > 0'
      notify:
        - 'Restart nginx'

    - name: 'Template {{ podman_nginx_config_name }} nginx config files'
      ansible.builtin.template:
        src: '{{ item.src }}'
        dest: '{{ podman_nginx_conf_mountpoint.stdout }}/{{ item.dest }}'
        owner: 'root'
        group: 'root'
        mode: '0644'
      loop: '{{ podman_nginx_config_templates | default([]) }}'
      when: 'podman_nginx_conf_mountpoint.stdout | default("") | trim | length > 0'
      notify:
        - 'Restart nginx'
  when: '((podman_nginx_config_copies | default([])) | length > 0) or ((podman_nginx_config_templates | default([])) | length > 0)'
