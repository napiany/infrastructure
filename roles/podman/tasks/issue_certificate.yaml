---
- name: 'Ensure certbot certificate request is valid'
  ansible.builtin.assert:
    that:
      - 'certbot_certificate.domains | length > 0'
      - '(certbot_certificate.domains | first | default("")) | length > 0'

- name: 'Set effective certbot certificate name'
  ansible.builtin.set_fact:
    certbot_certificate_name: '{{ certbot_certificate.domains | first }}'

- name: 'Check whether certificate already exists for {{ certbot_certificate_name }}'
  vars:
    cert_name: '{{ certbot_certificate_name }}'
    lineage_dir: '{{ certbot_mountpoint }}/live/{{ cert_name }}'
  ansible.builtin.stat:
    path: '{{ lineage_dir }}/fullchain.pem'
  register: 'certbot_certificate_file'

- name: 'Check whether manifest exists for {{ certbot_certificate_name }}'
  vars:
    manifest_name: '{{ certbot_certificate_name }}.domains'
  ansible.builtin.stat:
    path: '{{ certbot_mountpoint }}/ansible/{{ manifest_name }}'
  register: 'certbot_certificate_manifest_file'

- name: 'Read manifest for {{ certbot_certificate_name }}'
  vars:
    manifest_name: '{{ certbot_certificate_name }}.domains'
  ansible.builtin.slurp:
    path: '{{ certbot_mountpoint }}/ansible/{{ manifest_name }}'
  register: 'certbot_certificate_manifest_slurp'
  when: 'certbot_certificate_manifest_file.stat.exists'

- name: 'Set desired certificate manifest'
  vars:
    domains: '{{ certbot_certificate.domains }}'
  ansible.builtin.set_fact:
    certbot_desired_manifest: '{{ domains | join("\n") ~ "\n" }}'

- name: 'Set current certificate manifest'
  vars:
    manifest_content: '{{ certbot_certificate_manifest_slurp.content }}'
  ansible.builtin.set_fact:
    certbot_current_manifest: '{{ manifest_content | b64decode }}'
  when: 'certbot_certificate_manifest_file.stat.exists'

- name: 'Set empty current certificate manifest'
  ansible.builtin.set_fact:
    certbot_current_manifest: ''
  when: 'not certbot_certificate_manifest_file.stat.exists'

- name: 'Set certificate missing state'
  ansible.builtin.set_fact:
    certbot_cert_missing: '{{ not certbot_certificate_file.stat.exists }}'

- name: 'Set certificate manifest state'
  vars:
    current_manifest: '{{ certbot_current_manifest }}'
    desired_manifest: '{{ certbot_desired_manifest }}'
  ansible.builtin.set_fact:
    certbot_manifest_ok: '{{ current_manifest == desired_manifest }}'

- name: 'Reset certbot domain argv'
  ansible.builtin.set_fact:
    certbot_domain_argv: []

- name: 'Build certbot domain argv'
  ansible.builtin.set_fact:
    certbot_domain_argv: '{{ certbot_domain_argv + ["-d", certbot_domain] }}'
  loop: '{{ certbot_certificate.domains }}'
  loop_control:
    loop_var: 'certbot_domain'

- name: 'Set certbot issue argv'
  ansible.builtin.set_fact:
    certbot_issue_argv:
      - 'podman'
      - 'run'
      - '--rm'
      - '--entrypoint'
      - '/usr/local/bin/certbot'
      - '-v'
      - 'certbot:/etc/letsencrypt:z'
      - '-v'
      - 'certbot-config:/hooks:ro,z'
      - 'localhost/certbot:latest'
      - 'certonly'
      - '--authenticator'
      - 'dns-desec'
      - '--dns-desec-credentials'
      - '/etc/letsencrypt/secrets/DESEC.ini'
      - '--dns-desec-propagation-seconds'
      - '120'
      - '--deploy-hook'
      - '/hooks/certbot-deploy-hook.sh'
      - '--non-interactive'
      - '--agree-tos'
      - '--no-eff-email'
      - '--key-type'
      - 'ecdsa'
      - '--reuse-key'
      - '--required-profile'
      - 'shortlived'
      - '--cert-name'
      - '{{ certbot_certificate_name }}'

- name: 'Check certbot image runtime for {{ certbot_certificate_name }}'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'run'
      - '--rm'
      - '--entrypoint'
      - '/usr/local/bin/certbot'
      - 'localhost/certbot:latest'
      - '--version'
  register: 'certbot_issue_runtime_check'
  changed_when: false
  failed_when: false
  when: 'not ansible_check_mode'

- name: 'Rebuild certbot image when runtime is invalid for {{ certbot_certificate_name }}'
  ansible.builtin.command:
    argv:
      - 'systemctl'
      - 'restart'
      - '--wait'
      - 'certbot-build.service'
  register: 'certbot_issue_build_restart'
  changed_when: 'certbot_issue_build_restart.rc == 0'
  failed_when: 'certbot_issue_build_restart.rc != 0'
  when:
    - 'not ansible_check_mode'
    - 'certbot_issue_runtime_check.rc != 0'

- name: 'Recheck certbot image runtime for {{ certbot_certificate_name }}'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'run'
      - '--rm'
      - '--entrypoint'
      - '/usr/local/bin/certbot'
      - 'localhost/certbot:latest'
      - '--version'
  register: 'certbot_issue_runtime_check_after_rebuild'
  changed_when: false
  failed_when: false
  when: 'not ansible_check_mode'

- name: 'Ensure certbot image runtime is valid for {{ certbot_certificate_name }}'
  ansible.builtin.assert:
    that:
      - 'certbot_issue_runtime_check_after_rebuild.rc == 0'
    fail_msg: 'The local certbot image is still invalid after rebuilding certbot-build.service.'
  when: 'not ansible_check_mode'

- name: 'Issue certificate for {{ certbot_certificate_name }}'
  ansible.builtin.command:
    argv: '{{ certbot_issue_argv + certbot_domain_argv }}'
  when:
    - 'certbot_cert_missing or not certbot_manifest_ok'
  changed_when: true
  notify:
    - 'Refresh cert consumers'

- name: 'Replay certbot deploy hook for {{ certbot_certificate_name }}'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'run'
      - '--rm'
      - '--entrypoint'
      - '/bin/sh'
      - '-e'
      - 'RENEWED_LINEAGE=/etc/letsencrypt/live/{{ certbot_certificate_name }}'
      - '-v'
      - 'certbot:/etc/letsencrypt:z'
      - '-v'
      - 'certbot-config:/hooks:ro,z'
      - 'localhost/certbot:latest'
      - '/hooks/certbot-deploy-hook.sh'
  changed_when: false
  when: 'not ansible_check_mode'

- name: 'Record issued domains for {{ certbot_certificate_name }}'
  vars:
    manifest_name: '{{ certbot_certificate_name }}.domains'
  ansible.builtin.copy:
    dest: '{{ certbot_mountpoint }}/ansible/{{ manifest_name }}'
    content: '{{ certbot_desired_manifest }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
  when:
    - 'certbot_cert_missing or not certbot_manifest_ok'
