---
- name: 'Set SeedVault values'
  ansible.builtin.set_fact:
    seedvault_quadlets:
      - src: 'seedvault/haproxy-seedvault.network'
        dest: 'haproxy-seedvault.network'
        restart_units:
          - 'haproxy.service'
          - 'seedvault.service'
      - src: 'seedvault/seedvault.build'
        dest: 'seedvault.build'
        restart_units:
          - 'seedvault.service'
      - src: 'seedvault/seedvault.containerfile'
        dest: 'seedvault.containerfile'
        restart_units:
          - 'seedvault.service'
      - src: 'seedvault/seedvault-extra.conf'
        dest: 'seedvault-extra.conf'
        restart_units:
          - 'seedvault.service'
      - src: 'seedvault/seedvault.container'
        dest: 'seedvault.container'
        restart_units:
          - 'seedvault.service'
    seedvault_volumes:
      - name: 'seedvault-config'
        uid: '300018'
        gid: '300018'
      - name: 'seedvault-data'
        uid: '300018'
        gid: '300018'

- name: 'Copy SeedVault Quadlets'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'quadlets'
    podman_quadlet_files: '{{ seedvault_quadlets }}'

- name: 'Create SeedVault volumes'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume: '{{ item }}'
  loop: '{{ seedvault_volumes }}'
  loop_control:
    label: '{{ item.name }}'

- name: 'Set SeedVault htpasswd value'
  ansible.builtin.set_fact:
    seedvault_htpasswd_content: '{{ lookup("vars", "vault_podman_secret_seedvault_htpasswd", default="") }}'
    seedvault_config_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("seedvault-config", "") }}'
    seedvault_data_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("seedvault-data", "") }}'
  no_log: true

- name: 'Create SeedVault data directories'
  ansible.builtin.file:
    path: '{{ seedvault_data_mountpoint }}/{{ item }}'
    state: 'directory'
    owner: '300018'
    group: '300018'
    mode: '0700'
  loop:
    - 'pixel8a'
    - 'pixel8pro'
  when: 'seedvault_data_mountpoint | length > 0'

- name: 'Validate SeedVault htpasswd value'
  ansible.builtin.assert:
    that:
      - 'seedvault_htpasswd_content | length > 0'
    fail_msg: 'Missing vault_podman_secret_seedvault_htpasswd for SeedVault.'
  no_log: true

- name: 'Check the current SeedVault htpasswd'
  ansible.builtin.stat:
    path: '{{ seedvault_config_mountpoint }}/htpasswd'
  register: 'seedvault_htpasswd_file'
  when: 'seedvault_config_mountpoint | length > 0'

- name: 'Read the current SeedVault htpasswd'
  ansible.builtin.slurp:
    src: '{{ seedvault_config_mountpoint }}/htpasswd'
  register: 'seedvault_htpasswd_file_raw'
  when:
    - 'seedvault_config_mountpoint | length > 0'
    - 'seedvault_htpasswd_file.stat.exists | default(false)'
  no_log: true

- name: 'Write the SeedVault htpasswd'
  ansible.builtin.copy:
    content: '{{ seedvault_htpasswd_content }}'
    dest: '{{ seedvault_config_mountpoint }}/htpasswd'
    owner: '300018'
    group: '300018'
    mode: '0600'
    unsafe_writes: true
  register: 'seedvault_htpasswd_copy'
  when:
    - 'seedvault_config_mountpoint | length > 0'
    - 'not (seedvault_htpasswd_file.stat.exists | default(false)) or (seedvault_htpasswd_file_raw.content | b64decode) != seedvault_htpasswd_content'
  no_log: true

- name: 'Track SeedVault restart after htpasswd changes'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'track_units'
    podman_restart_units:
      - 'seedvault.service'
  when:
    - 'seedvault_htpasswd_copy is defined'
    - 'seedvault_htpasswd_copy.changed | default(false)'

- name: 'Set SeedVault htpasswd ownership'
  ansible.builtin.file:
    path: '{{ seedvault_config_mountpoint }}/htpasswd'
    owner: '300018'
    group: '300018'
    mode: '0600'
    state: 'file'
  when:
    - 'seedvault_config_mountpoint | length > 0'
    - 'not ansible_check_mode or (seedvault_htpasswd_file.stat.exists | default(false))'
  changed_when: false
  no_log: true

- name: 'Start SeedVault'
  ansible.builtin.systemd:
    name: 'seedvault.service'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Issue the SeedVault certificate'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'certificate'
    podman_certificate:
      domains:
        - 'seedvault.napiany.com'
