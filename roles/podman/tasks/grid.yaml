---
- name: 'Set Grid values'
  ansible.builtin.set_fact:
    grid_secrets:
      - name: 'grid-postgres_password'
        value_var: 'vault_podman_secret_grid_postgres_password'
        restart_units:
          - 'grid-postgres.service'
          - 'grid.service'
    grid_quadlets:
      - src: 'grid/haproxy-grid.network'
        dest: 'haproxy-grid.network'
        restart_units:
          - 'haproxy.service'
          - 'grid.service'
      - src: 'grid/grid-postgres.network'
        dest: 'grid-postgres.network'
        restart_units:
          - 'grid-postgres.service'
          - 'grid.service'
      - src: 'grid/grid-postgres.container'
        dest: 'grid-postgres.container'
        restart_units:
          - 'grid-postgres.service'
      - src: 'grid/grid.container'
        dest: 'grid.container'
        restart_units:
          - 'grid.service'
    grid_volumes:
      - name: 'grid-postgres'
        uid: '300014'
        gid: '300014'
      - name: 'grid'
        uid: '300013'
        gid: '300013'

- name: 'Manage Grid secrets'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'secret'
    podman_secret: '{{ item }}'
  loop: '{{ grid_secrets }}'
  loop_control:
    label: '{{ item.name }}'

- name: 'Copy Grid Quadlets'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'quadlets'
    podman_quadlet_files: '{{ grid_quadlets }}'

- name: 'Create Grid volumes'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume: '{{ item }}'
  loop: '{{ grid_volumes }}'
  loop_control:
    label: '{{ item.name }}'

- name: 'Set Grid mount point'
  ansible.builtin.set_fact:
    grid_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("grid", "") }}'

- name: 'Create Grid media store directory'
  ansible.builtin.file:
    path: '{{ grid_mountpoint }}/media_store'
    state: 'directory'
    owner: '300013'
    group: '300013'
    mode: '0700'
  when: 'grid_mountpoint | length > 0'

- name: 'Check the Grid homeserver config'
  ansible.builtin.stat:
    path: '{{ grid_mountpoint }}/homeserver.yaml'
  register: 'grid_homeserver_file'
  when: 'grid_mountpoint | length > 0'

- name: 'Check the Grid signing key'
  ansible.builtin.stat:
    path: '{{ grid_mountpoint }}/grid.napiany.com.signing.key'
  register: 'grid_signing_key_file'
  when: 'grid_mountpoint | length > 0'

- name: 'Generate the initial Grid Synapse config'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'run'
      - '--rm'
      - '--user'
      - '300013:300013'
      - '-e'
      - 'SYNAPSE_SERVER_NAME=grid.napiany.com'
      - '-e'
      - 'SYNAPSE_REPORT_STATS=no'
      - '-v'
      - 'grid:/data:Z'
      - 'ghcr.io/element-hq/synapse:v1.151.0@sha256:184dc8757daef019b511e7f96fc6e5edfb880fd074d8cf702c7e3aa899d188c8'
      - 'generate'
  register: 'grid_generate_config'
  changed_when: 'grid_generate_config.rc == 0'
  when:
    - 'not ansible_check_mode'
    - 'grid_mountpoint | length > 0'
    - 'not (grid_homeserver_file.stat.exists | default(false)) or not (grid_signing_key_file.stat.exists | default(false))'

- name: 'Refresh the Grid config state'
  ansible.builtin.stat:
    path: '{{ grid_mountpoint }}/homeserver.yaml'
  register: 'grid_homeserver_file'
  when: 'grid_mountpoint | length > 0'

- name: 'Render the Grid homeserver config'
  ansible.builtin.set_fact:
    grid_homeserver_config_content: '{{ lookup("template", "grid/homeserver.yaml.j2") }}'
  when:
    - 'grid_mountpoint | length > 0'
    - 'not ansible_check_mode or (grid_homeserver_file.stat.exists | default(false))'
  no_log: true

- name: 'Read the current Grid homeserver config'
  ansible.builtin.slurp:
    src: '{{ grid_mountpoint }}/homeserver.yaml'
  register: 'grid_homeserver_file_raw'
  when:
    - 'grid_mountpoint | length > 0'
    - 'grid_homeserver_file.stat.exists | default(false)'
  no_log: true

- name: 'Write the Grid homeserver config'
  ansible.builtin.copy:
    content: '{{ grid_homeserver_config_content }}'
    dest: '{{ grid_mountpoint }}/homeserver.yaml'
    owner: '300013'
    group: '300013'
    mode: '0600'
    unsafe_writes: true
  register: 'grid_homeserver_config_file'
  when:
    - 'grid_mountpoint | length > 0'
    - 'not ansible_check_mode or (grid_homeserver_file.stat.exists | default(false))'
    - 'not (grid_homeserver_file.stat.exists | default(false)) or (grid_homeserver_file_raw.content | b64decode) != grid_homeserver_config_content'
  no_log: true

- name: 'Track Grid restart after config changes'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'track_units'
    podman_restart_units:
      - 'grid.service'
  when:
    - 'grid_homeserver_config_file is defined'
    - 'grid_homeserver_config_file.changed | default(false)'

- name: 'Set Grid homeserver config ownership'
  ansible.builtin.file:
    path: '{{ grid_mountpoint }}/homeserver.yaml'
    owner: '300013'
    group: '300013'
    mode: '0600'
    state: 'file'
  when:
    - 'grid_mountpoint | length > 0'
    - 'not ansible_check_mode or (grid_homeserver_file.stat.exists | default(false))'
  changed_when: false
  no_log: true

- name: 'Start Grid Postgres'
  ansible.builtin.systemd:
    name: 'grid-postgres.service'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Start Grid'
  ansible.builtin.systemd:
    name: 'grid.service'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Issue the Grid certificate'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'certificate'
    podman_certificate:
      domains:
        - 'grid.napiany.com'
