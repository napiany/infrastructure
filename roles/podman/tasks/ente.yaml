---
- name: 'Manage Ente Postgres podman secret'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'secret'
    podman_secret:
      name: 'ente-postgres_password'
      value_var: 'vault_podman_secret_ente_postgres_password'
      restart_units:
        - 'ente-postgres.service'
  no_log: true

- name: 'Copy Ente Quadlet files'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'quadlets'
    podman_quadlet_files:
      - src: 'ente/haproxy-ente.network'
        dest: 'haproxy-ente.network'
        restart_units:
          - 'haproxy.service'
          - 'ente-garage.service'
          - 'ente-museum.service'
          - 'ente-web.service'
      - src: 'ente/ente-backend.network'
        dest: 'ente-backend.network'
        restart_units:
          - 'ente-postgres.service'
          - 'ente-garage.service'
          - 'ente-museum.service'
      - src: 'ente/ente-postgres.container'
        dest: 'ente-postgres.container'
        restart_units:
          - 'ente-postgres.service'
      - src: 'ente/ente-garage.container'
        dest: 'ente-garage.container'
        restart_units:
          - 'ente-garage.service'
      - src: 'ente/ente-museum.container'
        dest: 'ente-museum.container'
        restart_units:
          - 'ente-museum.service'
      - src: 'ente/ente-web.build'
        dest: 'ente-web.build'
        restart_units:
          - 'ente-web.service'
      - src: 'ente/ente-web.containerfile'
        dest: 'ente-web.containerfile'
        restart_units:
          - 'ente-web.service'
      - src: 'ente/ente-web.container'
        dest: 'ente-web.container'
        restart_units:
          - 'ente-web.service'

- name: 'Prepare Ente Postgres volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'ente-postgres'
      uid: '300016'
      gid: '300016'

- name: 'Prepare Ente config volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'ente-config'
      uid: '300015'
      gid: '300015'

- name: 'Set Ente config volume mount point'
  ansible.builtin.set_fact:
    ente_config_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("ente-config", "") }}'

- name: 'Prepare Ente Garage config volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'ente-garage-config'
      uid: '300017'
      gid: '300017'

- name: 'Set Ente Garage config volume mount point'
  ansible.builtin.set_fact:
    ente_garage_config_mountpoint: '{{ (podman_volume_mountpoints | default({})).get("ente-garage-config", "") }}'

- name: 'Prepare Ente Garage metadata volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'ente-garage-meta'
      uid: '300017'
      gid: '300017'

- name: 'Create Ente Garage data directories'
  ansible.builtin.file:
    path: '/srv/data/garage'
    state: 'directory'
    owner: '300017'
    group: '300017'
    mode: '0700'

- name: 'Check whether Ente Garage config exists'
  ansible.builtin.stat:
    path: '{{ ente_garage_config_mountpoint }}/garage.toml'
  register: 'ente_garage_config_file'
  when: 'ente_garage_config_mountpoint | length > 0'

- name: 'Render Ente Garage config'
  ansible.builtin.set_fact:
    ente_garage_config_content: "{{
      lookup('template', 'ente/garage.toml.j2') }}"
  when:
    - 'ente_garage_config_mountpoint | length > 0'
    - 'not ansible_check_mode or
      (ente_garage_config_file.stat.exists | default(false))'
  no_log: true

- name: 'Read current Ente Garage config'
  ansible.builtin.slurp:
    src: '{{ ente_garage_config_mountpoint }}/garage.toml'
  register: 'ente_garage_config_file_raw'
  when:
    - 'ente_garage_config_mountpoint | length > 0'
    - 'ente_garage_config_file.stat.exists | default(false)'
  no_log: true

- name: 'Write Ente Garage config when content changed'
  ansible.builtin.copy:
    content: '{{ ente_garage_config_content }}'
    dest: '{{ ente_garage_config_mountpoint }}/garage.toml'
    owner: '300017'
    group: '300017'
    mode: '0600'
    unsafe_writes: true
  when:
    - 'ente_garage_config_mountpoint | length > 0'
    - 'not ansible_check_mode or
      (ente_garage_config_file.stat.exists | default(false))'
    - 'not (ente_garage_config_file.stat.exists | default(false)) or
      (ente_garage_config_file_raw.content | b64decode) !=
      ente_garage_config_content'
  register: 'ente_garage_config_written'
  no_log: true

- name: 'Track Ente Garage restart after config changes'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'track_units'
    podman_restart_units:
      - 'ente-garage.service'
  when:
    - 'ente_garage_config_written is defined'
    - 'ente_garage_config_written.changed | default(false)'

- name: 'Set Ente Garage config ownership'
  ansible.builtin.file:
    path: '{{ ente_garage_config_mountpoint }}/garage.toml'
    owner: '300017'
    group: '300017'
    mode: '0600'
    state: 'file'
  when:
    - 'ente_garage_config_mountpoint | length > 0'
    - 'not ansible_check_mode or
      (ente_garage_config_file.stat.exists | default(false))'
  changed_when: false
  no_log: true

- name: 'Enable and start ente-garage.service'
  ansible.builtin.systemd:
    name: 'ente-garage.service'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Wait for Ente Garage admin API'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'status'
  register: 'ente_garage_status'
  changed_when: false
  retries: 20
  delay: 3
  until: 'ente_garage_status.rc == 0'
  when: 'not ansible_check_mode'

- name: 'Set Ente Garage unassigned node ID'
  ansible.builtin.set_fact:
    ente_garage_unassigned_node_id: '{{ ente_garage_status.stdout |
      regex_search("[0-9a-f]{8,}") | default("") }}'
  when:
    - 'not ansible_check_mode'
    - '"NO ROLE ASSIGNED" in (ente_garage_status.stdout | default(""))'

- name: 'Assign the Ente Garage single-node layout'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'layout'
      - 'assign'
      - '-z'
      - 'dc1'
      - '-c'
      - '1G'
      - '{{ ente_garage_unassigned_node_id }}'
  changed_when: true
  when:
    - 'not ansible_check_mode'
    - 'ente_garage_unassigned_node_id | default("") | length > 0'

- name: 'Apply the Ente Garage single-node layout'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'layout'
      - 'apply'
      - '--version'
      - '1'
  changed_when: true
  when:
    - 'not ansible_check_mode'
    - 'ente_garage_unassigned_node_id | default("") | length > 0'

- name: 'Check Ente Garage buckets'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'bucket'
      - 'info'
      - '{{ ente_garage_bucket }}'
  register: 'ente_garage_bucket_infos'
  changed_when: false
  failed_when: false
  loop:
    - 'b2-eu-cen'
    - 'wasabi-eu-central-2-v3'
    - 'scw-eu-fr-v3'
  loop_control:
    loop_var: 'ente_garage_bucket'
  when: 'not ansible_check_mode'

- name: 'Set missing Ente Garage buckets'
  ansible.builtin.set_fact:
    ente_garage_missing_buckets: '{{
      ente_garage_bucket_infos.results |
      default([]) |
      rejectattr("rc", "equalto", 0) |
      map(attribute="ente_garage_bucket") |
      list }}'
  when: 'not ansible_check_mode'

- name: 'Create missing Ente Garage buckets'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'bucket'
      - 'create'
      - '{{ ente_garage_bucket }}'
  loop: '{{ ente_garage_missing_buckets | default([]) }}'
  loop_control:
    loop_var: 'ente_garage_bucket'
  changed_when: true
  when: 'not ansible_check_mode'

- name: 'Check Ente Garage S3 key'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'key'
      - 'info'
      - 'ente-s3'
  register: 'ente_garage_key_info'
  changed_when: false
  failed_when: false
  when: 'not ansible_check_mode'

- name: 'Create the Ente Garage S3 key'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'key'
      - 'create'
      - 'ente-s3'
  changed_when: true
  when:
    - 'not ansible_check_mode'
    - 'ente_garage_key_info.rc != 0'
  no_log: true

- name: 'Read the Ente Garage S3 key with secret'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'key'
      - 'info'
      - '--show-secret'
      - 'ente-s3'
  register: 'ente_garage_key_info_with_secret'
  changed_when: false
  when: 'not ansible_check_mode'
  no_log: true

- name: 'Set Ente Garage S3 key facts'
  ansible.builtin.set_fact:
    ente_garage_s3_key_id: '{{
      (ente_garage_key_info_with_secret.stdout |
      regex_findall("(?m)^Key ID:\s+(.+)$") |
      first |
      default("")) }}'
    ente_garage_s3_secret_key: '{{
      (ente_garage_key_info_with_secret.stdout |
      regex_findall("(?m)^Secret key:\s+(.+)$") |
      first |
      default("")) }}'
  when: 'not ansible_check_mode'
  no_log: true

- name: 'Assert Ente Garage S3 key facts are available'
  ansible.builtin.assert:
    that:
      - 'ente_garage_s3_key_id | default("") | length > 0'
      - 'ente_garage_s3_secret_key | default("") | length > 0'
    fail_msg: 'Failed to read the Garage-generated ente-s3 access key.'
  when: 'not ansible_check_mode'
  no_log: true

- name: 'Refresh Ente Garage bucket grants'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'bucket'
      - 'info'
      - '{{ ente_garage_bucket }}'
  register: 'ente_garage_bucket_grants'
  changed_when: false
  failed_when: false
  loop:
    - 'b2-eu-cen'
    - 'wasabi-eu-central-2-v3'
    - 'scw-eu-fr-v3'
  loop_control:
    loop_var: 'ente_garage_bucket'
  when: 'not ansible_check_mode'

- name: 'Set Ente Garage buckets missing the ente-s3 grant'
  ansible.builtin.set_fact:
    ente_garage_ungranted_buckets: '{{
      ente_garage_bucket_grants.results |
      default([]) |
      rejectattr("stdout", "search", "ente-s3") |
      map(attribute="ente_garage_bucket") |
      list }}'
  when: 'not ansible_check_mode'

- name: 'Authorize the Ente Garage S3 key on required buckets'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'exec'
      - '--user'
      - '300017:300017'
      - 'ente-garage'
      - '/garage'
      - '-c'
      - '/config/garage.toml'
      - 'bucket'
      - 'allow'
      - '--read'
      - '--write'
      - '--owner'
      - '{{ ente_garage_bucket }}'
      - '--key'
      - 'ente-s3'
  loop: '{{ ente_garage_ungranted_buckets | default([]) }}'
  loop_control:
    loop_var: 'ente_garage_bucket'
  changed_when: true
  when: 'not ansible_check_mode'

- name: 'Set Ente admin user ID'
  ansible.builtin.set_fact:
    ente_admin_user_id: '{{ lookup(
      "vars", "vault_podman_secret_ente_admin_user_id", default=""
      ) | string | trim }}'
  no_log: true

- name: 'Check whether Ente credentials config exists'
  ansible.builtin.stat:
    path: '{{ ente_config_mountpoint }}/credentials.yaml'
  register: 'ente_credentials_file'
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'

- name: 'Render Ente credentials config'
  ansible.builtin.set_fact:
    ente_credentials_content: "{{
      lookup('template', 'ente/credentials.yaml.j2') }}"
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'
  no_log: true

- name: 'Read current Ente credentials config'
  ansible.builtin.slurp:
    src: '{{ ente_config_mountpoint }}/credentials.yaml'
  register: 'ente_credentials_file_raw'
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'
    - 'ente_credentials_file.stat.exists | default(false)'
  no_log: true

- name: 'Write Ente credentials config when content changed'
  ansible.builtin.copy:
    content: '{{ ente_credentials_content }}'
    dest: '{{ ente_config_mountpoint }}/credentials.yaml'
    owner: '300015'
    group: '300015'
    mode: '0600'
    unsafe_writes: true
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'
    - 'not (ente_credentials_file.stat.exists | default(false)) or
      (ente_credentials_file_raw.content | b64decode) !=
      ente_credentials_content'
  register: 'ente_credentials_written'
  no_log: true

- name: 'Track Ente Museum restart after credential changes'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'track_units'
    podman_restart_units:
      - 'ente-museum.service'
  when:
    - 'ente_credentials_written is defined'
    - 'ente_credentials_written.changed | default(false)'

- name: 'Set Ente credentials config ownership'
  ansible.builtin.file:
    path: '{{ ente_config_mountpoint }}/credentials.yaml'
    owner: '300015'
    group: '300015'
    mode: '0600'
    state: 'file'
  when:
    - 'ente_config_mountpoint | length > 0'
    - 'not ansible_check_mode'
  changed_when: false
  no_log: true

- name: 'Enable and start ente-postgres.service'
  ansible.builtin.systemd:
    name: 'ente-postgres.service'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Issue the Ente certificate'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'certificate'
    podman_certificate:
      domains:
        - 'api.ente.napiany.com'
        - 's3.ente.napiany.com'
        - 'ente.napiany.com'
        - 'web.ente.napiany.com'
        - 'albums.ente.napiany.com'
        - 'accounts.ente.napiany.com'
        - 'auth.ente.napiany.com'
        - 'cast.ente.napiany.com'
        - 'locker.ente.napiany.com'
        - 'embed.ente.napiany.com'
        - 'paste.ente.napiany.com'
        - 'memories.ente.napiany.com'
  when:
    - 'not ansible_check_mode or
      certbot_mountpoint | default("") | trim | length > 0'

- name: 'Enable and start ente-museum.service'
  ansible.builtin.systemd:
    name: 'ente-museum.service'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Enable and start ente-web.service'
  ansible.builtin.systemd:
    name: 'ente-web.service'
    state: 'started'
    enabled: true
    daemon_reload: true
