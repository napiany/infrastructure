---
- name: 'Set Autopush values'
  vars:
    autopush_crypto_keys_source: '{{ lookup("vars", "vault_podman_secret_autopush_crypto_keys", default=[]) }}'
    autopush_auth_keys_source: '{{ lookup("vars", "vault_podman_secret_autopush_auth_keys", default=[]) }}'
    autopush_crypto_keys_candidate: '{{ autopush_crypto_keys_source if (autopush_crypto_keys_source is sequence and not (autopush_crypto_keys_source is string)) else (autopush_crypto_keys_source | trim | from_json) }}'
    autopush_auth_keys_candidate: '{{ autopush_auth_keys_source if (autopush_auth_keys_source is sequence and not (autopush_auth_keys_source is string)) else (autopush_auth_keys_source | trim | from_json) }}'
  ansible.builtin.set_fact:
    autopush_crypto_keys_list: '{{ autopush_crypto_keys_candidate if (autopush_crypto_keys_candidate is sequence and not (autopush_crypto_keys_candidate is string)) else [autopush_crypto_keys_candidate] }}'
    autopush_auth_keys_list: '{{ autopush_auth_keys_candidate if (autopush_auth_keys_candidate is sequence and not (autopush_auth_keys_candidate is string)) else [autopush_auth_keys_candidate] }}'

- name: 'Build Autopush secret values'
  ansible.builtin.set_fact:
    autopush_crypto_keys_value: '{{ "[" ~ (autopush_crypto_keys_list | join(",")) ~ "]" }}'
    autopush_auth_keys_value: '{{ "[" ~ (autopush_auth_keys_list | join(",")) ~ "]" }}'
  no_log: true

- name: 'Set Autopush service values'
  ansible.builtin.set_fact:
    autopush_secrets:
      - name: 'autopush_crypto_keys'
        value: '{{ autopush_crypto_keys_value }}'
        restart_units:
          - 'autoconnect.service'
          - 'autoendpoint.service'
      - name: 'autopush_auth_keys'
        value: '{{ autopush_auth_keys_value }}'
        restart_units:
          - 'autoconnect.service'
          - 'autoendpoint.service'
    autopush_quadlets:
      - src: 'autopush/haproxy-autopush.network'
        dest: 'haproxy-autopush.network'
        restart_units:
          - 'haproxy.service'
          - 'autoconnect.service'
          - 'autoendpoint.service'
      - src: 'autopush/autopush-valkey.network'
        dest: 'autopush-valkey.network'
        restart_units:
          - 'autopush-valkey.service'
          - 'autoconnect.service'
          - 'autoendpoint.service'
      - src: 'autopush/autopush-valkey.container'
        dest: 'autopush-valkey.container'
        restart_units:
          - 'autopush-valkey.service'
      - src: 'autopush/autoconnect.container'
        dest: 'autoconnect.container'
        restart_units:
          - 'autoconnect.service'
      - src: 'autopush/autoconnect.build'
        dest: 'autoconnect.build'
        restart_units:
          - 'autoconnect.service'
      - src: 'autopush/autoconnect.containerfile'
        dest: 'autoconnect.containerfile'
        restart_units:
          - 'autoconnect.service'
      - src: 'autopush/autoendpoint.container'
        dest: 'autoendpoint.container'
        restart_units:
          - 'autoendpoint.service'
      - src: 'autopush/autoendpoint.build'
        dest: 'autoendpoint.build'
        restart_units:
          - 'autoendpoint.service'
      - src: 'autopush/autoendpoint.containerfile'
        dest: 'autoendpoint.containerfile'
        restart_units:
          - 'autoendpoint.service'
  no_log: true

- name: 'Manage Autopush secrets'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'secret'
    podman_secret: '{{ item }}'
  loop: '{{ autopush_secrets }}'
  loop_control:
    label: '{{ item.name }}'
  no_log: true

- name: 'Copy Autopush Quadlets'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'quadlets'
    podman_quadlet_files: '{{ autopush_quadlets }}'

- name: 'Create the Autopush Valkey volume'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'volume'
    podman_volume:
      name: 'autopush-valkey'
      uid: '300012'
      gid: '300012'

- name: 'Start Autopush Valkey'
  ansible.builtin.systemd:
    name: 'autopush-valkey.service'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Issue the Autopush certificate'
  ansible.builtin.include_tasks: 'service_task.yaml'
  vars:
    podman_service_task: 'certificate'
    podman_certificate:
      domains:
        - 'push.napiany.com'
        - 'updates.push.napiany.com'

- name: 'Start Autopush application units'
  ansible.builtin.systemd:
    name: '{{ item }}'
    state: 'started'
    enabled: true
    daemon_reload: true
  loop:
    - 'autoconnect.service'
    - 'autoendpoint.service'
