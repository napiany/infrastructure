---
- name: 'Set MollySocket values'
  ansible.builtin.set_fact:
    mollysocket_secrets:
      - name: 'mollysocket_vapid_privkey'
        value_var: 'vault_podman_secret_mollysocket_vapid_privkey'
        restart_units:
          - 'mollysocket.service'
      - name: 'mollysocket_allowed_uuids'
        value_var: 'vault_podman_secret_mollysocket_allowed_uuids'
        restart_units:
          - 'mollysocket.service'
    mollysocket_quadlets:
      - src: 'mollysocket/haproxy-mollysocket.network'
        dest: 'haproxy-mollysocket.network'
        restart_units:
          - 'haproxy.service'
          - 'mollysocket.service'
      - src: 'mollysocket/mollysocket.container'
        dest: 'mollysocket.container'
        restart_units:
          - 'mollysocket.service'

- name: 'Manage MollySocket secrets'
  ansible.builtin.include_tasks: 'helpers/secret.yaml'
  vars:
    podman_secret: '{{ item }}'
  loop: '{{ mollysocket_secrets }}'
  loop_control:
    label: '{{ item.name }}'

- name: 'Copy MollySocket Quadlets'
  ansible.builtin.include_tasks: 'helpers/quadlets.yaml'
  vars:
    podman_quadlet_files: '{{ mollysocket_quadlets }}'

- name: 'Create the MollySocket volume'
  ansible.builtin.include_tasks: 'helpers/volume.yaml'
  vars:
    podman_volume:
      name: 'mollysocket'
      uid: '300009'
      gid: '300009'

- name: 'Copy the MollySocket config'
  ansible.builtin.copy:
    src: 'mollysocket/config.toml'
    dest: '{{ podman_volume_mountpoints.mollysocket }}/config.toml'
    owner: '300009'
    group: '300009'
    mode: '0600'
  register: 'mollysocket_config_file'
  when: '(podman_volume_mountpoints | default({})).get(''mollysocket'', '''') | length > 0'

- name: 'Track MollySocket restart after config changes'
  ansible.builtin.include_tasks: 'helpers/restart_units.yaml'
  vars:
    podman_restart_units:
      - 'mollysocket.service'
  when:
    - 'mollysocket_config_file is defined'
    - 'mollysocket_config_file.changed | default(false)'

- name: 'Issue the MollySocket certificate'
  ansible.builtin.include_tasks: 'helpers/certificate.yaml'
  vars:
    podman_certificate:
      domains:
        - 'mollysocket.napiany.com'

- name: 'Start MollySocket'
  ansible.builtin.systemd:
    name: 'mollysocket.service'
    state: 'started'
    enabled: true
    daemon_reload: true
