---
- name: 'Get nginx-logs volume mount point for CrowdSec agent hosts'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'volume'
      - 'inspect'
      - 'nginx-logs'
      - '--format'
      - '{{ "{{.Mountpoint}}" }}'
  register: 'crowdsec_nginx_logs_mountpoint'
  changed_when: false
  failed_when: 'not ansible_check_mode and crowdsec_nginx_logs_mountpoint.rc != 0'
  check_mode: false
  when:
    - 'crowdsec_agent_enabled | bool'
    - 'not (crowdsec_is_lapi_server | bool)'

- name: 'Seed nginx log files before starting CrowdSec on agent hosts'
  ansible.builtin.command:
    argv:
      - 'install'
      - '-o'
      - '300001'
      - '-g'
      - '300001'
      - '-m'
      - '0644'
      - '/dev/null'
      - '{{ crowdsec_nginx_logs_mountpoint.stdout }}/{{ item }}'
    creates: '{{ crowdsec_nginx_logs_mountpoint.stdout }}/{{ item }}'
  loop:
    - 'access.log'
    - 'error.log'
  when:
    - 'crowdsec_agent_enabled | bool'
    - 'not (crowdsec_is_lapi_server | bool)'
    - 'crowdsec_nginx_logs_mountpoint.stdout | default("") | trim | length > 0'

- name: 'Ensure nginx log file ownership and mode before starting CrowdSec on agent hosts'
  ansible.builtin.file:
    path: '{{ crowdsec_nginx_logs_mountpoint.stdout }}/{{ item }}'
    state: 'file'
    owner: '300001'
    group: '300001'
    mode: '0644'
  loop:
    - 'access.log'
    - 'error.log'
  when:
    - 'crowdsec_agent_enabled | bool'
    - 'not (crowdsec_is_lapi_server | bool)'
    - 'crowdsec_nginx_logs_mountpoint.stdout | default("") | trim | length > 0'

- name: 'Ensure the HAProxy CrowdSec Podman network exists before starting edge services'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'network'
      - 'create'
      - '--ignore'
      - '--ipv6'
      - '--subnet'
      - '10.89.106.0/24'
      - '--gateway'
      - '10.89.106.1'
      - 'systemd-haproxy-crowdsec'
  register: 'crowdsec_haproxy_network_ensure'
  changed_when: false
  failed_when: 'crowdsec_haproxy_network_ensure.rc != 0'
  when:
    - 'crowdsec_is_lapi_server | bool'
    - 'crowdsec_edge_bouncer_enabled | bool'
