---
- name: 'Create {{ manage_volume_name }} volume'
  ansible.builtin.command:
    cmd: 'podman volume create {{ manage_volume_name }}'
  register: 'manage_volume_create'
  changed_when: 'manage_volume_create.rc == 0'
  failed_when:
    - 'manage_volume_create.rc != 0'
    - "'already exists' not in manage_volume_create.stderr"

- name: 'Prepare {{ manage_volume_name }} volume'
  block:
    - name: 'Get {{ manage_volume_name }} volume mount point'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'volume'
          - 'inspect'
          - '{{ manage_volume_name }}'
          - '--format'
          - '{{ "{{.Mountpoint}}" }}'
      register: 'manage_volume_mountpoint'
      changed_when: false
      failed_when: 'not ansible_check_mode and manage_volume_mountpoint.rc != 0'
      check_mode: false

    - name: 'Read {{ manage_volume_name }} volume ownership state'
      ansible.builtin.stat:
        path: '{{ manage_volume_mountpoint.stdout }}'
        follow: false
      register: 'manage_volume_mountpoint_stat'
      when:
        - 'manage_volume_mountpoint.stdout | default("") | trim |
          length > 0'

    - name: 'Set {{ manage_volume_name }} volume ownership'
      ansible.builtin.file:
        path: '{{ manage_volume_mountpoint.stdout }}'
        state: 'directory'
        owner: '{{ manage_volume_uid }}'
        group: '{{ manage_volume_gid | default(manage_volume_uid) }}'
        mode: '{{ manage_volume_mode | default("0700") }}'
        recurse: '{{ manage_volume_recurse | default(false) }}'
      when:
        - 'manage_volume_mountpoint.stdout | default("") | trim |
          length > 0'
        - '(
          manage_volume_mountpoint_stat.stat.uid | default(-1) | string
          ) != (manage_volume_uid | string) or (
          manage_volume_mountpoint_stat.stat.gid | default(-1) | string
          ) != ((manage_volume_gid | default(manage_volume_uid)) | string) or (
          manage_volume_mountpoint_stat.stat.mode | default("") | string
          ) != (manage_volume_mode | default("0700"))'

    - name: 'Ensure {{ manage_volume_name }} volume directories exist'
      ansible.builtin.file:
        path: '{{ manage_volume_mountpoint.stdout }}/{{ item.path }}'
        state: 'directory'
        owner: '{{ item.owner | default(manage_volume_uid) }}'
        group: '{{ item.group | default(
          manage_volume_gid | default(manage_volume_uid)) }}'
        mode: '{{ item.mode | default("0700") }}'
      loop: '{{ manage_volume_directories | default([]) }}'
      when:
        - 'manage_volume_mountpoint.stdout | default("") | trim |
          length > 0'
