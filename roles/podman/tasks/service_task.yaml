---
- name: 'Copy Quadlet files'
  when:
    - "podman_service_task == 'quadlets'"
    - '(podman_quadlet_files | default([]) | length) > 0'
  block:
    - name: 'Copy Quadlet files'
      ansible.builtin.copy:
        src: '{{ podman_quadlet_file.src }}'
        dest: '/etc/containers/systemd/{{ podman_quadlet_file.dest }}'
        owner: 'root'
        group: 'root'
        mode: '0644'
      loop: '{{ podman_quadlet_files }}'
      loop_control:
        loop_var: 'podman_quadlet_file'
        label: '{{ podman_quadlet_file.dest }}'
      register: 'podman_quadlet_copy_results'
      notify:
        - 'Daemon reload'

    - name: 'Track network recreation after Quadlet changes'
      ansible.builtin.set_fact:
        podman_changed_networks: '{{ ((podman_changed_networks | default([])) + [item.podman_quadlet_file.dest | regex_replace("\\.network$", "")]) | unique }}'
        podman_network_units_to_restart: '{{ ((podman_network_units_to_restart | default([])) + (item.podman_quadlet_file.restart_units | default([]))) | unique }}'
      loop: '{{ podman_quadlet_copy_results.results | default([]) }}'
      loop_control:
        label: '{{ item.podman_quadlet_file.dest | default("") }}'
      when:
        - 'item.changed | default(false)'
        - '(item.podman_quadlet_file.dest | basename) is match(".*\\.network$")'
      changed_when: true
      notify:
        - 'Recreate changed Podman networks'

    - name: 'Track service restarts after Quadlet changes'
      ansible.builtin.set_fact:
        podman_units_to_restart: '{{ ((podman_units_to_restart | default([])) + (item.podman_quadlet_file.restart_units | default([]))) | unique }}'
      loop: '{{ podman_quadlet_copy_results.results | default([]) }}'
      loop_control:
        label: '{{ item.podman_quadlet_file.dest | default("") }}'
      when:
        - 'item.changed | default(false)'
        - 'not ((item.podman_quadlet_file.dest | basename) is match(".*\\.network$"))'
        - '(item.podman_quadlet_file.restart_units | default([]) | length) > 0'
      changed_when: true
      notify:
        - 'Restart changed Podman units'

- name: 'Manage podman secret'
  when: "podman_service_task == 'secret'"
  block:
    - name: 'Read podman secret value'
      ansible.builtin.set_fact:
        podman_secret_value: '{{ podman_secret.value | default(lookup("vars", podman_secret.value_var, default="")) }}'
      no_log: true

    - name: 'Validate podman secret value'
      ansible.builtin.assert:
        that:
          - 'podman_secret_value | length > 0'
        fail_msg: '{{ "Missing " ~ podman_secret.value_var ~ " for podman secret " ~ podman_secret.name if "value_var" in podman_secret else "Missing value for podman secret " ~ podman_secret.name }}'
      no_log: true

    - name: 'Set podman secret checksum'
      ansible.builtin.set_fact:
        podman_secret_checksum: '{{ podman_secret_value | hash("sha256") }}'
      no_log: true

    - name: 'Inspect existing podman secret'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'secret'
          - 'inspect'
          - '{{ podman_secret.name }}'
      register: 'podman_secret_inspect'
      changed_when: false
      failed_when: false

    - name: 'Set current podman secret checksum'
      ansible.builtin.set_fact:
        podman_secret_current_checksum: "{{ ((podman_secret_inspect.stdout | from_json | first).Spec.Labels | default({})).get('ansible-sha256', '') if (podman_secret_inspect.rc == 0 and (podman_secret_inspect.stdout | trim | length > 0)) else '' }}"
      no_log: true

    - name: 'Create or rotate podman secret'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'secret'
          - 'create'
          - '--replace'
          - '--label'
          - 'managed-by=ansible'
          - '--label'
          - 'ansible-sha256={{ podman_secret_checksum }}'
          - '{{ podman_secret.name }}'
          - '-'
        stdin: '{{ podman_secret_value }}'
        stdin_add_newline: false
      register: 'podman_secret_create'
      when: 'podman_secret_current_checksum != podman_secret_checksum'
      changed_when: true
      no_log: true

    - name: 'Track service restarts after podman secret changes'
      ansible.builtin.set_fact:
        podman_units_to_restart: '{{ ((podman_units_to_restart | default([])) + (podman_secret.restart_units | default([]))) | unique }}'
      when:
        - 'podman_secret_create is defined'
        - 'podman_secret_create.changed | default(false)'
        - '(podman_secret.restart_units | default([]) | length) > 0'
      changed_when: true
      notify:
        - 'Restart changed Podman units'

    - name: 'Track secret consumer restarts after podman secret changes'
      ansible.builtin.set_fact:
        podman_secret_consumer_units: '{{ ((podman_secret_consumer_units | default([])) + (podman_secret.consumer_units | default([]))) | unique }}'
      when:
        - 'podman_secret_create is defined'
        - 'podman_secret_create.changed | default(false)'
        - '(podman_secret.consumer_units | default([]) | length) > 0'
      changed_when: true
      notify:
        - 'Try restart podman secret consumers'

- name: 'Manage podman volume'
  when: "podman_service_task == 'volume'"
  block:
    - name: 'Create volume'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'volume'
          - 'create'
          - '{{ podman_volume.name }}'
      register: 'podman_volume_create'
      changed_when: 'podman_volume_create.rc == 0'
      failed_when:
        - 'podman_volume_create.rc != 0'
        - '"already exists" not in podman_volume_create.stderr'

    - name: 'Read volume mount point'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'volume'
          - 'inspect'
          - '{{ podman_volume.name }}'
          - '--format'
          - '{{ "{{.Mountpoint}}" }}'
      register: 'podman_volume_mountpoint'
      changed_when: false
      failed_when: 'not ansible_check_mode and podman_volume_mountpoint.rc != 0'
      check_mode: false

    - name: 'Record volume mount point'
      ansible.builtin.set_fact:
        podman_volume_mountpoints: '{{ (podman_volume_mountpoints | default({})) | combine({podman_volume.name: (podman_volume_mountpoint.stdout | trim)}) }}'

    - name: 'Set volume ownership and mode'
      ansible.builtin.file:
        path: '{{ podman_volume_mountpoint.stdout }}'
        state: 'directory'
        owner: '{{ podman_volume.uid | default(omit) }}'
        group: '{{ podman_volume.gid | default(podman_volume.uid | default(omit)) }}'
        mode: '{{ podman_volume.mode | default("0700") }}'
        recurse: '{{ podman_volume.recurse | default(false) }}'
      when:
        - 'podman_volume_mountpoint.stdout | default("") | trim | length > 0'

- name: 'Validate certificate request'
  ansible.builtin.assert:
    that:
      - '(podman_certificate.domains | default([]) | length) > 0'
      - '((podman_certificate.domains | first | default("")) | length) > 0'
    fail_msg: 'Certificate requests need at least one domain.'
  when: "podman_service_task == 'certificate'"

- name: 'Issue certificate'
  when:
    - "podman_service_task == 'certificate'"
    - 'not ansible_check_mode or certbot_mountpoint | default("") | trim | length > 0'
  block:
    - name: 'Inspect shared certbot volume mount points'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'volume'
          - 'inspect'
          - '{{ item.name }}'
          - '--format'
          - '{{ "{{.Mountpoint}}" }}'
      loop:
        - name: 'certbot'
          fact: 'certbot_mountpoint'
        - name: 'certbot-config'
          fact: 'certbot_config_mountpoint'
        - name: 'certbot-webroot'
          fact: 'certbot_webroot_mountpoint'
      loop_control:
        label: '{{ item.name }}'
      register: 'podman_certificate_shared_volume_mountpoints'
      changed_when: false
      failed_when: false
      when:
        - '(certbot_mountpoint | default("") | trim | length) == 0 or (certbot_config_mountpoint | default("") | trim | length) == 0 or (certbot_webroot_mountpoint | default("") | trim | length) == 0'

    - name: 'Set shared certbot mount point facts'
      ansible.builtin.set_fact:
        certbot_mountpoint: '{{ ((certbot_mountpoint | default("") | trim | length) > 0) | ternary(certbot_mountpoint, ((podman_certificate_shared_volume_mountpoints.results | default([]) | selectattr("item.name", "equalto", "certbot") | map(attribute="stdout") | first | default("")) | trim)) }}'
        certbot_config_mountpoint: '{{ ((certbot_config_mountpoint | default("") | trim | length) > 0) | ternary(certbot_config_mountpoint, ((podman_certificate_shared_volume_mountpoints.results | default([]) | selectattr("item.name", "equalto", "certbot-config") | map(attribute="stdout") | first | default("")) | trim)) }}'
        certbot_webroot_mountpoint: '{{ ((certbot_webroot_mountpoint | default("") | trim | length) > 0) | ternary(certbot_webroot_mountpoint, ((podman_certificate_shared_volume_mountpoints.results | default([]) | selectattr("item.name", "equalto", "certbot-webroot") | map(attribute="stdout") | first | default("")) | trim)) }}'
      when: 'podman_certificate_shared_volume_mountpoints is defined'

    - name: 'Validate shared certbot infrastructure for certificate issuance'
      ansible.builtin.assert:
        that:
          - 'certbot_mountpoint | default("") | trim | length > 0'
          - 'certbot_config_mountpoint | default("") | trim | length > 0'
          - 'certbot_webroot_mountpoint | default("") | trim | length > 0'
        fail_msg: 'Shared certbot volumes are unavailable. Run the HAProxy/certbot setup first or include the haproxy tag in this playbook run.'

    - name: 'Set certificate name'
      ansible.builtin.set_fact:
        podman_certificate_name: '{{ podman_certificate.domains | first }}'

    - name: 'Set expected certificate consumer outputs'
      ansible.builtin.set_fact:
        podman_certificate_consumer_outputs:
          - '{{ certbot_mountpoint }}/consumers/haproxy/{{ podman_certificate_name }}.pem'

    - name: 'Add Kanidm certificate consumer outputs'
      vars:
        podman_certificate_kanidm_domain: '{{ ((podman_services | default({})).get("kanidm", {})).get("domain", "") }}'
      ansible.builtin.set_fact:
        podman_certificate_consumer_outputs: '{{ podman_certificate_consumer_outputs + [certbot_mountpoint ~ "/consumers/kanidm/fullchain.pem", certbot_mountpoint ~ "/consumers/kanidm/privkey.pem"] }}'
      when: 'podman_certificate_name == podman_certificate_kanidm_domain'

    - name: 'Add Stalwart certificate consumer outputs'
      vars:
        podman_certificate_stalwart_settings: '{{ (podman_services | default({})).get("stalwart", {}) }}'
        podman_certificate_stalwart_blocks: '{{ podman_certificate_stalwart_settings.get("certificate_blocks", [{"domains": podman_certificate_stalwart_settings.get("domains", [])}] if podman_certificate_stalwart_settings.get("domains", []) else []) }}'
      ansible.builtin.set_fact:
        podman_certificate_consumer_outputs: '{{ podman_certificate_consumer_outputs + [certbot_mountpoint ~ "/consumers/stalwart/" ~ podman_certificate_name ~ "/fullchain.pem", certbot_mountpoint ~ "/consumers/stalwart/" ~ podman_certificate_name ~ "/privkey.pem"] }}'
      loop: '{{ podman_certificate_stalwart_blocks }}'
      loop_control:
        loop_var: 'podman_certificate_stalwart_block'
      when:
        - '(podman_certificate_stalwart_block.domains | default([]) | length) > 0'
        - 'podman_certificate_name == (podman_certificate_stalwart_block.domains | first)'

    - name: 'Check current certificate file'
      ansible.builtin.stat:
        path: '{{ certbot_mountpoint }}/live/{{ podman_certificate_name }}/fullchain.pem'
      register: 'podman_certificate_file'

    - name: 'Check current certificate manifest'
      ansible.builtin.stat:
        path: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.domains'
      register: 'podman_certificate_manifest_file'

    - name: 'Check current certificate challenge manifest'
      ansible.builtin.stat:
        path: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.challenge'
      register: 'podman_certificate_challenge_manifest_file'

    - name: 'Read current certificate manifest'
      ansible.builtin.slurp:
        path: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.domains'
      register: 'podman_certificate_manifest_raw'
      when: 'podman_certificate_manifest_file.stat.exists'

    - name: 'Read current certificate challenge manifest'
      ansible.builtin.slurp:
        path: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.challenge'
      register: 'podman_certificate_challenge_manifest_raw'
      when: 'podman_certificate_challenge_manifest_file.stat.exists'

    - name: 'Set desired certificate manifest'
      ansible.builtin.set_fact:
        podman_certificate_desired_manifest: '{{ podman_certificate.domains | join("\n") ~ "\n" }}'
        podman_certificate_current_manifest: '{{ (podman_certificate_manifest_raw.content | b64decode) if (podman_certificate_manifest_file.stat.exists | default(false)) else "" }}'
        podman_certificate_desired_challenge_manifest: 'http-01-webroot:/var/www/certbot{{ "\n" }}'
        podman_certificate_current_challenge_manifest: '{{ (podman_certificate_challenge_manifest_raw.content | b64decode) if (podman_certificate_challenge_manifest_file.stat.exists | default(false)) else "" }}'
        podman_certificate_missing: '{{ not podman_certificate_file.stat.exists }}'

    - name: 'Reset certificate domain arguments'
      ansible.builtin.set_fact:
        podman_certificate_domain_argv: []

    - name: 'Build certificate domain arguments'
      ansible.builtin.set_fact:
        podman_certificate_domain_argv: '{{ podman_certificate_domain_argv + ["-d", podman_certificate_domain] }}'
      loop: '{{ podman_certificate.domains }}'
      loop_control:
        loop_var: 'podman_certificate_domain'
        label: '{{ podman_certificate_domain }}'

    - name: 'Start HAProxy for ACME HTTP-01 challenges'
      ansible.builtin.systemd:
        name: 'haproxy.service'
        state: 'started'
        enabled: true
        daemon_reload: true
      when: "'haproxy' in (podman_containers_selected | default(podman_containers | default([])))"

    - name: 'Wait for HAProxy HTTP listener'
      ansible.builtin.wait_for:
        host: '{{ podman_wireguard_ip }}'
        port: 80
        timeout: 30
      when:
        - "'haproxy' in (podman_containers_selected | default(podman_containers | default([])))"
        - 'podman_wireguard_ip | default("") | length > 0'

    - name: 'Issue certificate'
      ansible.builtin.command:
        argv: '{{ [
          "podman", "run", "--rm",
          "-v", "certbot:/etc/letsencrypt:z",
          "-v", "certbot-webroot:/var/www/certbot:z",
          "-v", "certbot-config:/hooks:ro,z",
          podman_certbot_image,
          "certonly",
          "--webroot",
          "--webroot-path", "/var/www/certbot",
          "--preferred-challenges", "http",
          "--deploy-hook", "/hooks/certbot-deploy-hook.sh",
          "--non-interactive",
          "--agree-tos",
          "--no-eff-email",
          "--key-type", "ecdsa",
          "--reuse-key",
          "--required-profile", "shortlived",
          "--cert-name", podman_certificate_name
        ] + podman_certificate_domain_argv }}'
      register: 'podman_certificate_issue'
      when:
        - 'podman_certificate_missing or podman_certificate_current_manifest != podman_certificate_desired_manifest or podman_certificate_current_challenge_manifest != podman_certificate_desired_challenge_manifest'
      changed_when: true

    - name: 'Check current certificate consumer outputs'
      ansible.builtin.stat:
        path: '{{ podman_certificate_consumer_output }}'
      loop: '{{ podman_certificate_consumer_outputs | unique }}'
      loop_control:
        loop_var: 'podman_certificate_consumer_output'
        label: '{{ podman_certificate_consumer_output }}'
      register: 'podman_certificate_consumer_output_stats'

    - name: 'Set certificate consumer output state'
      ansible.builtin.set_fact:
        podman_certificate_consumer_outputs_missing: '{{ (podman_certificate_file.stat.exists | default(false)) and ((podman_certificate_consumer_output_stats.results | rejectattr("stat.exists", "equalto", true) | list | length) > 0) }}'

    - name: 'Set certificate deploy hook replay state'
      ansible.builtin.set_fact:
        podman_certificate_replay_needed: '{{ ((podman_certificate_issue is defined) and (podman_certificate_issue.changed | default(false))) or (podman_certificate_consumer_outputs_missing | default(false)) }}'

    - name: 'Replay certbot deploy hook for the current lineage'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'run'
          - '--rm'
          - '--entrypoint'
          - '/hooks/certbot-deploy-hook.sh'
          - '-e'
          - 'RENEWED_LINEAGE=/etc/letsencrypt/live/{{ podman_certificate_name }}'
          - '-v'
          - 'certbot:/etc/letsencrypt:z'
          - '-v'
          - 'certbot-config:/hooks:ro,z'
          - '{{ podman_certbot_image }}'
      register: 'podman_certificate_replay'
      changed_when: 'podman_certificate_replay_needed'
      when: 'podman_certificate_replay_needed'

    - name: 'Write certificate manifest'
      ansible.builtin.copy:
        dest: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.domains'
        content: '{{ podman_certificate_desired_manifest }}'
        owner: 'root'
        group: 'root'
        mode: '0644'
      when: 'podman_certificate_issue is defined and podman_certificate_issue.changed | default(false)'

    - name: 'Write certificate challenge manifest'
      ansible.builtin.copy:
        dest: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.challenge'
        content: '{{ podman_certificate_desired_challenge_manifest }}'
        owner: 'root'
        group: 'root'
        mode: '0644'
      when: 'podman_certificate_issue is defined and podman_certificate_issue.changed | default(false)'

    - name: 'Track service restarts after certificate changes'
      ansible.builtin.set_fact:
        podman_units_to_restart: '{{ ((podman_units_to_restart | default([])) + ["haproxy.service"] + (podman_certificate.restart_units | default([]))) | unique }}'
      when:
        - 'podman_certificate_replay is defined'
        - 'podman_certificate_replay.changed | default(false)'
      changed_when: true
      notify:
        - 'Restart changed Podman units'

- name: 'Track service restarts'
  ansible.builtin.set_fact:
    podman_units_to_restart: '{{ ((podman_units_to_restart | default([])) + (podman_restart_units | default([]))) | unique }}'
  when:
    - "podman_service_task == 'track_units'"
    - '(podman_restart_units | default([]) | length) > 0'
  changed_when: true
  notify:
    - 'Restart changed Podman units'
