---
- name: 'Manage Vaultwarden secrets'
  ansible.builtin.include_tasks: 'helpers/secret.yaml'
  vars:
    podman_secret: '{{ item }}'
  loop: '{{ (podman_service_manifests.vaultwarden | default({})).secrets | default([]) }}'
  loop_control:
    label: '{{ item.name }}'

- name: 'Copy Vaultwarden Quadlets'
  ansible.builtin.include_tasks: 'helpers/quadlets.yaml'
  vars:
    podman_quadlet_files: '{{ (podman_service_manifests.vaultwarden | default({})).quadlet_files | default([]) }}'

- name: 'Create Vaultwarden volumes'
  ansible.builtin.include_tasks: 'helpers/volume.yaml'
  vars:
    podman_volume: '{{ item }}'
  loop: '{{ (podman_service_manifests.vaultwarden | default({})).volumes | default([]) }}'
  loop_control:
    label: '{{ item.name }}'

- name: 'Start Vaultwarden Postgres'
  ansible.builtin.systemd:
    name: 'vaultwarden-postgres.service'
    state: 'started'
    enabled: true
    daemon_reload: true

- name: 'Issue the Vaultwarden certificate'
  ansible.builtin.include_tasks: 'helpers/certificate.yaml'
  vars:
    podman_certificate: '{{ ((podman_service_manifests.vaultwarden | default({})).certificates | default([]) | first) }}'
  when: '((podman_service_manifests.vaultwarden | default({})).certificates | default([]) | length) > 0'

- name: 'Start Vaultwarden'
  ansible.builtin.systemd:
    name: 'vaultwarden.service'
    state: 'started'
    enabled: true
    daemon_reload: true
