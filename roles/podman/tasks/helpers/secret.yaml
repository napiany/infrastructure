---
- name: 'Read Podman secret value'
  ansible.builtin.set_fact:
    podman_secret_value: '{{ podman_secret.value | default(lookup(''vars'', podman_secret.value_var, default='''')) }}'
  no_log: true

- name: 'Validate Podman secret value'
  ansible.builtin.assert:
    that:
      - 'podman_secret_value | length > 0'
    fail_msg: '{{ ''Missing '' ~ podman_secret.value_var ~ '' for podman secret '' ~ podman_secret.name if ''value_var'' in podman_secret else ''Missing value for podman secret '' ~ podman_secret.name }}'
  no_log: true

- name: 'Set Podman secret checksum'
  ansible.builtin.set_fact:
    podman_secret_checksum: '{{ podman_secret_value | hash(''sha256'') }}'
  no_log: true

- name: 'Inspect existing Podman secret'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'secret'
      - 'inspect'
      - '{{ podman_secret.name }}'
  register: 'podman_secret_inspect'
  changed_when: false
  failed_when: false

- name: 'Set current Podman secret checksum'
  ansible.builtin.set_fact:
    podman_secret_current_checksum: '{{ ((podman_secret_inspect.stdout | from_json | first).Spec.Labels | default({})).get(''ansible-sha256'', '''') if (podman_secret_inspect.rc == 0 and (podman_secret_inspect.stdout | trim | length > 0)) else '''' }}'
  no_log: true

- name: 'Create or rotate Podman secret'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'secret'
      - 'create'
      - '--replace'
      - '--label'
      - 'managed-by=ansible'
      - '--label'
      - 'ansible-sha256={{ podman_secret_checksum }}'
      - '{{ podman_secret.name }}'
      - '-'
    stdin: '{{ podman_secret_value }}'
    stdin_add_newline: false
  register: 'podman_secret_create'
  when: 'podman_secret_current_checksum != podman_secret_checksum'
  changed_when: true
  no_log: true

- name: 'Track service restarts after Podman secret changes'
  ansible.builtin.set_fact:
    podman_units_to_restart: '{{ ((podman_units_to_restart | default([])) + (podman_secret.restart_units | default([]))) | unique }}'
  when:
    - 'podman_secret_create is defined'
    - 'podman_secret_create.changed | default(false)'
    - '(podman_secret.restart_units | default([]) | length) > 0'
  changed_when: true
  notify:
    - 'Restart changed Podman units'

- name: 'Track secret consumer restarts after Podman secret changes'
  ansible.builtin.set_fact:
    podman_secret_consumer_units: '{{ ((podman_secret_consumer_units | default([])) + (podman_secret.consumer_units | default([]))) | unique }}'
  when:
    - 'podman_secret_create is defined'
    - 'podman_secret_create.changed | default(false)'
    - '(podman_secret.consumer_units | default([]) | length) > 0'
  changed_when: true
  notify:
    - 'Try restart podman secret consumers'
