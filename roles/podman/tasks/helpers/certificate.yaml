---
- name: 'Validate certificate request'
  ansible.builtin.assert:
    that:
      - '(podman_certificate.domains | default([]) | length) > 0'
      - '((podman_certificate.domains | first | default('''')) | length) > 0'
    fail_msg: 'Certificate requests need at least one domain.'

- name: 'Inspect shared certbot volume mount points'
  ansible.builtin.command:
    argv:
      - 'podman'
      - 'volume'
      - 'inspect'
      - '{{ podman_certbot_volume.name }}'
      - '--format'
      - '{{ ''{{.Mountpoint}}'' }}'
  loop:
    - name: 'certbot'
      fact: 'certbot_mountpoint'
    - name: 'certbot-config'
      fact: 'certbot_config_mountpoint'
    - name: 'certbot-webroot'
      fact: 'certbot_webroot_mountpoint'
    - name: 'haproxy-config'
      fact: 'haproxy_config_mountpoint'
  loop_control:
    loop_var: 'podman_certbot_volume'
    label: '{{ podman_certbot_volume.name }}'
  register: 'podman_certificate_shared_volume_mountpoints'
  changed_when: false
  failed_when: false
  when:
    - 'not ansible_check_mode or certbot_mountpoint | default('''') | trim | length > 0'
    - '(certbot_mountpoint | default('''') | trim | length) == 0 or (certbot_config_mountpoint | default('''') | trim | length) == 0 or (certbot_webroot_mountpoint | default('''') | trim | length) == 0'

- name: 'Set shared certbot mount point facts'
  ansible.builtin.set_fact:
    certbot_mountpoint: '{{ ((certbot_mountpoint | default('''') | trim | length) > 0) | ternary(certbot_mountpoint, ((podman_certificate_shared_volume_mountpoints.results | default([]) | selectattr(''podman_certbot_volume.name'', ''equalto'', ''certbot'') | map(attribute=''stdout'') | first | default('''')) | trim)) }}'
    certbot_config_mountpoint: '{{ ((certbot_config_mountpoint | default('''') | trim | length) > 0) | ternary(certbot_config_mountpoint, ((podman_certificate_shared_volume_mountpoints.results | default([]) | selectattr(''podman_certbot_volume.name'', ''equalto'', ''certbot-config'') | map(attribute=''stdout'') | first | default('''')) | trim)) }}'
    certbot_webroot_mountpoint: '{{ ((certbot_webroot_mountpoint | default('''') | trim | length) > 0) | ternary(certbot_webroot_mountpoint, ((podman_certificate_shared_volume_mountpoints.results | default([]) | selectattr(''podman_certbot_volume.name'', ''equalto'', ''certbot-webroot'') | map(attribute=''stdout'') | first | default('''')) | trim)) }}'
    haproxy_config_mountpoint: '{{ ((haproxy_config_mountpoint | default('''') | trim | length) > 0) | ternary(haproxy_config_mountpoint, ((podman_certificate_shared_volume_mountpoints.results | default([]) | selectattr(''podman_certbot_volume.name'', ''equalto'', ''haproxy-config'') | map(attribute=''stdout'') | first | default('''')) | trim)) }}'
  when: 'podman_certificate_shared_volume_mountpoints is defined'

- name: 'Validate shared certbot infrastructure for certificate issuance'
  ansible.builtin.assert:
    that:
      - 'certbot_mountpoint | default('''') | trim | length > 0'
      - 'certbot_config_mountpoint | default('''') | trim | length > 0'
      - 'certbot_webroot_mountpoint | default('''') | trim | length > 0'
    fail_msg: 'Shared certbot volumes are unavailable. Run the HAProxy/certbot setup first or include the haproxy tag in this playbook run.'
  when: 'not ansible_check_mode or certbot_mountpoint | default('''') | trim | length > 0'

- name: 'Set certificate name'
  ansible.builtin.set_fact:
    podman_certificate_name: '{{ podman_certificate.domains | first }}'

- name: 'Set passthrough certificate domains'
  vars:
    podman_certificate_kanidm_domain: '{{ ((podman_services | default({})).get(''kanidm'', {})).get(''domain'', '''') }}'
  ansible.builtin.set_fact:
    podman_certificate_passthrough_domains: '{{ ([podman_certificate_kanidm_domain] if (podman_certificate_kanidm_domain | length > 0) else []) | unique }}'
    podman_certificate_haproxy_consumer_enabled: '{{ podman_certificate_name not in (([podman_certificate_kanidm_domain] if (podman_certificate_kanidm_domain | length > 0) else []) | unique) }}'

- name: 'Validate HAProxy config volume for terminated certificates'
  ansible.builtin.assert:
    that:
      - 'haproxy_config_mountpoint | default('''') | trim | length > 0'
    fail_msg: 'The HAProxy config volume is unavailable. Run the HAProxy setup first or include the haproxy tag in this playbook run.'
  when: 'podman_certificate_haproxy_consumer_enabled | default(false)'

- name: 'Set expected certificate consumer outputs'
  ansible.builtin.set_fact:
    podman_certificate_consumer_outputs: '{{ ([haproxy_config_mountpoint ~ ''/certs/'' ~ podman_certificate_name ~ ''.pem''] if (podman_certificate_haproxy_consumer_enabled | default(false)) else []) }}'

- name: 'Add Kanidm certificate consumer outputs'
  vars:
    podman_certificate_kanidm_domain: '{{ ((podman_services | default({})).get(''kanidm'', {})).get(''domain'', '''') }}'
  ansible.builtin.set_fact:
    podman_certificate_consumer_outputs: '{{ podman_certificate_consumer_outputs + [certbot_mountpoint ~ ''/consumers/kanidm/fullchain.pem'', certbot_mountpoint ~ ''/consumers/kanidm/privkey.pem''] }}'
  when: 'podman_certificate_name == podman_certificate_kanidm_domain'

- name: 'Add Stalwart certificate consumer outputs'
  vars:
    podman_certificate_stalwart_settings: '{{ (podman_services | default({})).get(''stalwart'', {}) }}'
    podman_certificate_stalwart_blocks: '{{ podman_certificate_stalwart_settings.get(''certificate_blocks'', [{''domains'': podman_certificate_stalwart_settings.get(''domains'', [])}] if podman_certificate_stalwart_settings.get(''domains'', []) else []) }}'
  ansible.builtin.set_fact:
    podman_certificate_consumer_outputs: '{{ podman_certificate_consumer_outputs + [certbot_mountpoint ~ ''/consumers/stalwart/'' ~ podman_certificate_name ~ ''/fullchain.pem'', certbot_mountpoint ~ ''/consumers/stalwart/'' ~ podman_certificate_name ~ ''/privkey.pem''] }}'
  loop: '{{ podman_certificate_stalwart_blocks }}'
  loop_control:
    loop_var: 'podman_certificate_stalwart_block'
  when:
    - '(podman_certificate_stalwart_block.domains | default([]) | length) > 0'
    - 'podman_certificate_name == (podman_certificate_stalwart_block.domains | first)'

- name: 'Check current certificate file'
  ansible.builtin.stat:
    path: '{{ certbot_mountpoint }}/live/{{ podman_certificate_name }}/fullchain.pem'
  register: 'podman_certificate_file'
  when: 'not ansible_check_mode or certbot_mountpoint | default('''') | trim | length > 0'

- name: 'Check current certificate manifest'
  ansible.builtin.stat:
    path: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.domains'
  register: 'podman_certificate_manifest_file'
  when: 'not ansible_check_mode or certbot_mountpoint | default('''') | trim | length > 0'

- name: 'Check current certificate challenge manifest'
  ansible.builtin.stat:
    path: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.challenge'
  register: 'podman_certificate_challenge_manifest_file'
  when: 'not ansible_check_mode or certbot_mountpoint | default('''') | trim | length > 0'

- name: 'Read current certificate manifest'
  ansible.builtin.slurp:
    path: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.domains'
  register: 'podman_certificate_manifest_raw'
  when: 'podman_certificate_manifest_file.stat.exists | default(false)'

- name: 'Read current certificate challenge manifest'
  ansible.builtin.slurp:
    path: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.challenge'
  register: 'podman_certificate_challenge_manifest_raw'
  when: 'podman_certificate_challenge_manifest_file.stat.exists | default(false)'

- name: 'Set desired certificate manifest'
  ansible.builtin.set_fact:
    podman_certificate_desired_manifest: '{{ podman_certificate.domains | join("''\n''") ~ "''\n''" }}'
    podman_certificate_current_manifest: '{{ (podman_certificate_manifest_raw.content | b64decode) if (podman_certificate_manifest_file.stat.exists | default(false)) else '''' }}'
    podman_certificate_desired_challenge_manifest: 'http-01-webroot:/var/www/certbot{{ ''\n'' }}'
    podman_certificate_current_challenge_manifest: '{{ (podman_certificate_challenge_manifest_raw.content | b64decode) if (podman_certificate_challenge_manifest_file.stat.exists | default(false)) else '''' }}'
    podman_certificate_missing: '{{ not (podman_certificate_file.stat.exists | default(false)) }}'

- name: 'Reset certificate domain arguments'
  ansible.builtin.set_fact:
    podman_certificate_domain_argv: []

- name: 'Build certificate domain arguments'
  ansible.builtin.set_fact:
    podman_certificate_domain_argv: '{{ podman_certificate_domain_argv + [''-d'', podman_certificate_domain] }}'
  loop: '{{ podman_certificate.domains }}'
  loop_control:
    loop_var: 'podman_certificate_domain'
    label: '{{ podman_certificate_domain }}'

- name: 'Apply pending Podman changes before certificate issuance'
  ansible.builtin.meta: 'flush_handlers'

- name: 'Start HAProxy for ACME HTTP-01 challenges'
  ansible.builtin.systemd:
    name: 'haproxy.service'
    state: 'started'
    enabled: true
    daemon_reload: true
  when: '''haproxy'' in (podman_containers_selected | default(podman_containers | default([])))'

- name: 'Wait for HAProxy HTTP listener socket'
  ansible.builtin.command:
    argv:
      - 'ss'
      - '-Hln4'
  register: 'podman_haproxy_http_listener'
  changed_when: false
  retries: 30
  delay: 1
  until: 'podman_wireguard_ip ~ '':80'' in podman_haproxy_http_listener.stdout'
  when:
    - '''haproxy'' in (podman_containers_selected | default(podman_containers | default([])))'
    - 'podman_wireguard_ip | default('''') | length > 0'

- name: 'Set HAProxy WireGuard IPv6 HTTP listener socket'
  ansible.builtin.set_fact:
    podman_haproxy_http_listener_socket_ipv6: '[{{ podman_wireguard_ipv6_prefix ~ (podman_wireguard_ip.split(''.'')[-1]) }}]:80'
  when:
    - '''haproxy'' in (podman_containers_selected | default(podman_containers | default([])))'
    - 'podman_wireguard_ip | default('''') | length > 0'
    - 'podman_wireguard_ipv6_prefix | default('''') | length > 0'

- name: 'Wait for HAProxy WireGuard IPv6 HTTP listener socket'
  ansible.builtin.command:
    argv:
      - 'ss'
      - '-Hln6'
  register: 'podman_haproxy_http_listener_ipv6'
  changed_when: false
  retries: 30
  delay: 1
  until: 'podman_haproxy_http_listener_socket_ipv6 in podman_haproxy_http_listener_ipv6.stdout'
  when:
    - '''haproxy'' in (podman_containers_selected | default(podman_containers | default([])))'
    - 'podman_wireguard_ip | default('''') | length > 0'
    - 'podman_wireguard_ipv6_prefix | default('''') | length > 0'

- name: 'Issue certificate'
  ansible.builtin.command:
    argv: '{{ [
      ''podman'', ''run'', ''--rm'',
      ''-v'', ''certbot:/etc/letsencrypt:z'',
      ''-v'', ''certbot-webroot:/var/www/certbot:z'',
      ''-v'', ''certbot-config:/hooks:ro,z''
    ] + ([''-v'', ''haproxy-config:/haproxy-config:z''] if (podman_certificate_haproxy_consumer_enabled | default(false)) else []) + [
      podman_certbot_image,
      ''certonly'',
      ''--webroot'',
      ''--webroot-path'', ''/var/www/certbot'',
      ''--preferred-challenges'', ''http'',
      ''--deploy-hook'', ''/hooks/certbot-deploy-hook.sh'',
      ''--non-interactive'',
      ''--agree-tos'',
      ''--no-eff-email'',
      ''--key-type'', ''ecdsa'',
      ''--reuse-key'',
      ''--required-profile'', ''shortlived'',
      ''--cert-name'', podman_certificate_name
    ] + podman_certificate_domain_argv }}'
  register: 'podman_certificate_issue'
  when:
    - 'not ansible_check_mode or certbot_mountpoint | default('''') | trim | length > 0'
    - 'podman_certificate_missing or podman_certificate_current_manifest != podman_certificate_desired_manifest or podman_certificate_current_challenge_manifest != podman_certificate_desired_challenge_manifest'
  changed_when: true

- name: 'Check current certificate consumer outputs'
  ansible.builtin.stat:
    path: '{{ podman_certificate_consumer_output }}'
  loop: '{{ podman_certificate_consumer_outputs | unique }}'
  loop_control:
    loop_var: 'podman_certificate_consumer_output'
    label: '{{ podman_certificate_consumer_output }}'
  register: 'podman_certificate_consumer_output_stats'
  when: 'not ansible_check_mode or certbot_mountpoint | default('''') | trim | length > 0'

- name: 'Set certificate consumer output state'
  ansible.builtin.set_fact:
    podman_certificate_consumer_outputs_missing: '{{ (podman_certificate_file.stat.exists | default(false)) and (((podman_certificate_consumer_output_stats.results | default([])) | rejectattr(''stat.exists'', ''equalto'', true) | list | length) > 0) }}'

- name: 'Set certificate deploy hook replay state'
  ansible.builtin.set_fact:
    podman_certificate_replay_needed: '{{ ((podman_certificate_issue is defined) and (podman_certificate_issue.changed | default(false))) or (podman_certificate_consumer_outputs_missing | default(false)) }}'

- name: 'Replay certbot deploy hook for the current lineage'
  ansible.builtin.command:
    argv: '{{ [
      ''podman'', ''run'', ''--rm'',
      ''--entrypoint'', ''/hooks/certbot-deploy-hook.sh'',
      ''-e'', ''RENEWED_LINEAGE=/etc/letsencrypt/live/'' ~ podman_certificate_name,
      ''-v'', ''certbot:/etc/letsencrypt:z'',
      ''-v'', ''certbot-config:/hooks:ro,z''
    ] + ([''-v'', ''haproxy-config:/haproxy-config:z''] if (podman_certificate_haproxy_consumer_enabled | default(false)) else []) + [podman_certbot_image] }}'
  register: 'podman_certificate_replay'
  changed_when: 'podman_certificate_replay_needed'
  when: 'podman_certificate_replay_needed'

- name: 'Write certificate manifest'
  ansible.builtin.copy:
    dest: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.domains'
    content: '{{ podman_certificate_desired_manifest }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
  when: 'podman_certificate_issue is defined and podman_certificate_issue.changed | default(false)'

- name: 'Write certificate challenge manifest'
  ansible.builtin.copy:
    dest: '{{ certbot_mountpoint }}/ansible/{{ podman_certificate_name }}.challenge'
    content: '{{ podman_certificate_desired_challenge_manifest }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
  when: 'podman_certificate_issue is defined and podman_certificate_issue.changed | default(false)'

- name: 'Track service restarts after certificate changes'
  ansible.builtin.set_fact:
    podman_units_to_restart: '{{ ((podman_units_to_restart | default([])) + (([''haproxy.service''] if (podman_certificate_haproxy_consumer_enabled | default(false)) else [])) + (podman_certificate.restart_units | default([]))) | unique }}'
  when:
    - 'podman_certificate_replay is defined'
    - 'podman_certificate_replay.changed | default(false)'
  changed_when: true
  notify:
    - 'Restart changed Podman units'
