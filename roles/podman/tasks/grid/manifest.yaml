---
- name: 'Register Grid service manifest'
  vars:
    grid_manifest:
      quadlet_files:
        - src: 'grid/haproxy-grid.network'
          dest: 'haproxy-grid.network'
          restart_units:
            - 'haproxy.service'
            - 'grid.service'
        - src: 'grid/grid-postgres.network'
          dest: 'grid-postgres.network'
          restart_units:
            - 'grid-postgres.service'
            - 'grid.service'
        - src: 'grid/grid-postgres.container'
          dest: 'grid-postgres.container'
          restart_units:
            - 'grid-postgres.service'
        - src: 'grid/grid.container'
          dest: 'grid.container'
          restart_units:
            - 'grid.service'
      managed_files_extra: []
      secrets:
        - name: 'grid-postgres_password'
          value_var: 'vault_podman_secret_grid_postgres_password'
          restart_units:
            - 'grid-postgres.service'
            - 'grid.service'
      volumes:
        - name: 'grid-postgres'
          uid: '300014'
          gid: '300014'
        - name: 'grid'
          uid: '300013'
          gid: '300013'
      local_images: []
      certificates:
        - domains:
            - 'grid.napiany.com'
  ansible.builtin.set_fact:
    podman_service_manifests: '{{ (podman_service_manifests | default({})) | combine({''grid'': grid_manifest}, recursive=true) }}'
