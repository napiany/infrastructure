---
- name: 'Set nginx edge host facts'
  vars:
    haproxy_host_candidate: "{%- set ns = namespace(host='') -%}
      {%- for item in groups['servers'] | default([]) -%}
      {%- if
        ns.host | length == 0 and
        'haproxy' in (hostvars[item].podman_containers | default([]))
      -%}
      {%- set ns.host = item -%}
      {%- endif -%}
      {%- endfor -%}
      {{ ns.host }}"
  ansible.builtin.set_fact:
    haproxy_host: '{{ haproxy_host_candidate }}'
    nginx_edge_proxy_enabled: '{{ haproxy_host_candidate | length > 0 }}'

- name: 'Ensure nginx local listener facts exist'
  ansible.builtin.assert:
    that:
      - 'ansible_facts["default_ipv4"]["address"] | default("") | length > 0'
    fail_msg: 'Missing default IPv4 address for the nginx host'

- name: 'Ensure WireGuard variables exist for nginx edge listeners'
  ansible.builtin.assert:
    that:
      - 'podman_wireguard_ip | default("") | length > 0'
      - "(vault_wireguard_private_keys | default({})).get( inventory_hostname, '' ) | length > 0"
      - "(vault_wireguard_public_keys | default({})).get( haproxy_host, '' ) | length > 0"
      - "(vault_wireguard_preshared_keys | default({})).get( inventory_hostname, '' ) | length > 0"
    fail_msg: 'Missing required WireGuard variables for the nginx host'
  when: 'nginx_edge_proxy_enabled | bool'
  no_log: true
