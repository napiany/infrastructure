---
- name: 'Copy shared nginx upstream network files for enabled services'
  ansible.builtin.copy:
    src: '{{ item.src }}'
    dest: '/etc/containers/systemd/{{ item.dest }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
  loop:
    - service: 'kanidm'
      src: 'kanidm/nginx-kanidm.network'
      dest: 'nginx-kanidm.network'
    - service: 'vaultwarden'
      src: 'vaultwarden/nginx-vaultwarden.network'
      dest: 'nginx-vaultwarden.network'
    - service: 'grid'
      src: 'grid/nginx-grid.network'
      dest: 'nginx-grid.network'
    - service: 'ente'
      src: 'ente/nginx-ente.network'
      dest: 'nginx-ente.network'
    - service: 'containercve'
      src: 'containercve/nginx-containercve.network'
      dest: 'nginx-containercve.network'
    - service: 'stalwart'
      src: 'stalwart/nginx-stalwart.network'
      dest: 'nginx-stalwart.network'
    - service: 'autopush'
      src: 'autopush/nginx-autopush.network'
      dest: 'nginx-autopush.network'
    - service: 'mollysocket'
      src: 'mollysocket/nginx-mollysocket.network'
      dest: 'nginx-mollysocket.network'
  when: 'item.service in (podman_containers_selected | default([]))'
  notify:
    - 'Daemon reload'
    - 'Restart nginx'

- name: 'Copy nginx build files and unit'
  block:
    - name: 'Copy nginx.build'
      ansible.builtin.copy:
        src: 'nginx/nginx.build'
        dest: '/etc/containers/systemd/nginx.build'
        owner: 'root'
        group: 'root'
        mode: '0644'
      register: 'nginx_build_unit'
      notify:
        - 'Daemon reload'
        - 'Restart nginx'

    - name: 'Copy nginx Containerfile'
      ansible.builtin.copy:
        src: 'nginx/nginx.containerfile'
        dest: '/etc/containers/systemd/nginx.containerfile'
        owner: 'root'
        group: 'root'
        mode: '0644'
      register: 'nginx_containerfile_file'
      notify:
        - 'Daemon reload'
        - 'Restart nginx'

    - name: 'Copy nginx.conf build input'
      ansible.builtin.copy:
        src: 'nginx/nginx.conf'
        dest: '/etc/containers/systemd/nginx.conf'
        owner: 'root'
        group: 'root'
        mode: '0644'
      register: 'nginx_main_config_file'
      notify:
        - 'Restart nginx'

- name: 'Ensure /etc/wireguard exists for the nginx host'
  ansible.builtin.file:
    path: '/etc/wireguard'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0700'
  when: 'nginx_edge_proxy_enabled | bool'

- name: 'Template WireGuard client config for the nginx host'
  ansible.builtin.template:
    src: 'wireguard/wireguard-client.conf.j2'
    dest: '/etc/wireguard/wg0.conf'
    owner: 'root'
    group: 'root'
    mode: '0600'
  when: 'nginx_edge_proxy_enabled | bool'
  notify:
    - 'Restart wireguard'

- name: 'Enable and start wg-quick@wg0.service on nginx hosts'
  ansible.builtin.systemd:
    name: 'wg-quick@wg0.service'
    state: 'started'
    enabled: true
  when: 'nginx_edge_proxy_enabled | bool'

- name: 'Copy certbot quadlet and timer files'
  block:
    - name: 'Template certbot.container'
      ansible.builtin.template:
        src: 'certbot/certbot.container.j2'
        dest: '/etc/containers/systemd/certbot.container'
        owner: 'root'
        group: 'root'
        mode: '0644'
      register: 'certbot_container_unit'
      notify:
        - 'Daemon reload'
        - 'Restart certbot timer'

    - name: 'Copy certbot.build'
      ansible.builtin.copy:
        src: 'certbot/certbot.build'
        dest: '/etc/containers/systemd/certbot.build'
        owner: 'root'
        group: 'root'
        mode: '0644'
      register: 'certbot_build_unit'
      notify:
        - 'Daemon reload'
        - 'Restart certbot timer'

    - name: 'Copy certbot Containerfile'
      ansible.builtin.copy:
        src: 'certbot/certbot.containerfile'
        dest: '/etc/containers/systemd/certbot.containerfile'
        owner: 'root'
        group: 'root'
        mode: '0644'
      register: 'certbot_containerfile_file'
      notify:
        - 'Daemon reload'
        - 'Restart certbot timer'

    - name: 'Create the certbot config volume'
      ansible.builtin.command:
        cmd: 'podman volume create certbot-config'
      register: 'certbot_config_volume_create'
      changed_when: 'certbot_config_volume_create.rc == 0'
      failed_when:
        - 'certbot_config_volume_create.rc != 0'
        - "'already exists' not in certbot_config_volume_create.stderr"

    - name: 'Get certbot config volume mount point'
      ansible.builtin.command:
        argv:
          - 'podman'
          - 'volume'
          - 'inspect'
          - 'certbot-config'
          - '--format'
          - '{{ "{{.Mountpoint}}" }}'
      register: 'certbot_config_mountpoint'
      changed_when: false
      failed_when: 'not ansible_check_mode and certbot_config_mountpoint.rc != 0'
      check_mode: false

    - name: 'Template certbot deploy hook into the config volume'
      ansible.builtin.template:
        src: 'certbot/certbot-deploy-hook.sh.j2'
        dest: '{{ certbot_config_mountpoint.stdout }}/certbot-deploy-hook.sh'
        owner: 'root'
        group: 'root'
        mode: '0755'
      when: 'certbot_config_mountpoint.stdout | default("") | trim | length > 0'

    - name: 'Copy certbot.timer'
      ansible.builtin.copy:
        src: 'certbot/certbot.timer'
        dest: '/etc/systemd/system/certbot.timer'
        owner: 'root'
        group: 'root'
        mode: '0644'
      register: 'certbot_timer_unit'
      notify:
        - 'Daemon reload'
        - 'Restart certbot timer'

- name: 'Ensure certbot deSEC credentials are defined'
  vars:
    certbot_desec_var: 'vault_certbot_dns_desec_ini'
  ansible.builtin.assert:
    that:
      - 'lookup(''vars'', certbot_desec_var, default='''') | length > 0'
    fail_msg: 'Missing vault_certbot_dns_desec_ini for certbot DNS deSEC'
  no_log: true

- name: 'Reload systemd after nginx and certbot unit changes'
  vars:
    nginx_daemon_reload_triggers:
      - '{{ nginx_container_unit is defined and nginx_container_unit.changed }}'
      - '{{ nginx_build_unit.changed }}'
      - '{{ nginx_containerfile_file.changed }}'
      - '{{ nginx_main_config_file is defined and nginx_main_config_file.changed }}'
      - '{{ certbot_container_unit.changed }}'
      - '{{ certbot_build_unit.changed }}'
      - '{{ certbot_timer_unit.changed }}'
  ansible.builtin.systemd:
    daemon_reload: true
  when: "nginx_daemon_reload_triggers | map('bool') | select('equalto', true) | list | length > 0"
