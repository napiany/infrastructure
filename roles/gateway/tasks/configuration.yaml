---
- name: 'Create /etc/wireguard'
  ansible.builtin.file:
    path: '/etc/wireguard'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0700'

- name: 'Create /etc/crowdsec/bouncers'
  ansible.builtin.file:
    path: '/etc/crowdsec/bouncers'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: 'Create crowdsec-firewall-bouncer override directory'
  ansible.builtin.file:
    path: '/etc/systemd/system/crowdsec-firewall-bouncer.service.d'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: 'Render gateway WireGuard config'
  ansible.builtin.template:
    src: 'wireguard/wireguard-server.conf.j2'
    dest: '/etc/wireguard/wg0.conf'
    owner: 'root'
    group: 'root'
    mode: '0600'
  notify:
    - 'Restart gateway wireguard'

- name: 'Render gateway CrowdSec firewall bouncer local override'
  ansible.builtin.template:
    src: 'crowdsec/crowdsec-firewall-bouncer.yaml.j2'
    dest: '/etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml.local'
    owner: 'root'
    group: 'root'
    mode: '0600'
  no_log: true
  notify:
    - 'Restart gateway crowdsec-firewall-bouncer'

- name: 'Install crowdsec-firewall-bouncer systemd override'
  ansible.builtin.copy:
    src: 'crowdsec-firewall-bouncer-override.conf'
    dest: '/etc/systemd/system/crowdsec-firewall-bouncer.service.d/override.conf'
    owner: 'root'
    group: 'root'
    mode: '0644'
  notify:
    - 'Reload gateway systemd'
    - 'Restart gateway crowdsec-firewall-bouncer'
