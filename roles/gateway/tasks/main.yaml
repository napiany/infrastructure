---
- name: 'Set gateway values'
  ansible.builtin.set_fact:
    gateway_firewall_bouncer_key: '{{ lookup("vars", "vault_crowdsec_firewall_bouncer_key", default=lookup("vars", "vault_crowdsec_nginx_bouncer_key", default="")) }}'
  no_log: true

- name: 'Validate miniserver WireGuard address'
  ansible.builtin.assert:
    that:
      - "(hostvars['miniserver'].podman_wireguard_ip | default('')) | length > 0"
      - "(vault_wireguard_private_keys | default({})).get('gateway', '') | length > 0"
      - "(vault_wireguard_public_keys | default({})).get('miniserver', '') | length > 0"
      - "(vault_wireguard_preshared_keys | default({})).get('miniserver', '') | length > 0"
      - 'gateway_firewall_bouncer_key | length > 0'
    fail_msg: 'Missing gateway WireGuard or CrowdSec firewall bouncer configuration.'
  no_log: true

- name: 'Add the CrowdSec package repository'
  ansible.builtin.copy:
    src: 'crowdsec/crowdsec.repo'
    dest: '/etc/zypp/repos.d/crowdsec.repo'
    owner: 'root'
    group: 'root'
    mode: '0644'

- name: 'Ensure /etc/pki/rpm-gpg exists'
  ansible.builtin.file:
    path: '/etc/pki/rpm-gpg'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: 'Copy vendored CrowdSec repository signing keys'
  ansible.builtin.copy:
    src: 'crowdsec/{{ item }}'
    dest: '/etc/pki/rpm-gpg/{{ item }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
  loop:
    - 'crowdsec-packagecloud.gpg'
    - 'crowdsec-crowdsec-EDE2C695EC9A5A5C.pub.gpg'
    - 'crowdsec-crowdsec-C822EDD6B39954A1.pub.gpg'
    - 'crowdsec-crowdsec-FED78314A2468CCF.pub.gpg'

- name: 'Import vendored CrowdSec repository signing keys'
  ansible.builtin.rpm_key:
    key: '/etc/pki/rpm-gpg/{{ item }}'
    state: 'present'
  loop:
    - 'crowdsec-packagecloud.gpg'
    - 'crowdsec-crowdsec-EDE2C695EC9A5A5C.pub.gpg'
    - 'crowdsec-crowdsec-C822EDD6B39954A1.pub.gpg'
    - 'crowdsec-crowdsec-FED78314A2468CCF.pub.gpg'


- name: 'Install gateway packages'
  community.general.zypper:
    name:
      - 'wireguard-tools'
      - 'nftables'
      - 'crowdsec-firewall-bouncer-nftables'
    state: 'present'
    update_cache: true
  notify:
    - 'Reboot'

- name: 'Apply pending reboot for gateway packages'
  ansible.builtin.meta: 'flush_handlers'

- name: 'Create /etc/wireguard'
  ansible.builtin.file:
    path: '/etc/wireguard'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0700'

- name: 'Create /etc/crowdsec/bouncers'
  ansible.builtin.file:
    path: '/etc/crowdsec/bouncers'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: 'Render gateway WireGuard config'
  ansible.builtin.template:
    src: 'wireguard/wireguard-server.conf.j2'
    dest: '/etc/wireguard/wg0.conf'
    owner: 'root'
    group: 'root'
    mode: '0600'
  notify:
    - 'Restart gateway wireguard'

- name: 'Render gateway CrowdSec firewall bouncer config'
  ansible.builtin.template:
    src: 'crowdsec/crowdsec-firewall-bouncer.yaml.j2'
    dest: '/etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml'
    owner: 'root'
    group: 'root'
    mode: '0600'
  no_log: true
  notify:
    - 'Restart gateway crowdsec-firewall-bouncer'

- name: 'Start gateway WireGuard'
  ansible.builtin.systemd:
    name: 'wg-quick@wg0.service'
    state: 'started'
    enabled: true

- name: 'Start gateway CrowdSec firewall bouncer'
  ansible.builtin.systemd:
    name: 'crowdsec-firewall-bouncer.service'
    state: 'started'
    enabled: true
