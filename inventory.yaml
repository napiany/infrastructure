---
all:
  children:
    servers:
      hosts:
        gateway:
          ansible_host: 'gateway.napiany.com'
          monitoring_scrape_address: '10.66.66.1'
        miniserver:
          ansible_host: 'miniserver.internal'
          monitoring_scrape_address: '10.66.66.2'
          podman_wireguard_ip: '10.66.66.2'
          podman_local_ingress_ipv6: 'fd6e:64e3:424d:3::459'
          podman_local_source_ipv4_cidrs:
            - '127.0.0.0/8'
            - '10.66.66.0/24'
            - '192.168.0.0/16'
          podman_local_source_ipv6_cidrs:
            - '::1/128'
            - 'fd66:66::/64'
            - 'fd6e:64e3:424d::/48'
          podman_containers:
            - 'haproxy'
            - 'kanidm'
            - 'ente'
            - 'vaultwarden'
            - 'seedvault'
            - 'stalwart'
            - 'mollysocket'
            - 'autopush'
            - 'monitoring'
          podman_services:
            kanidm:
              domain: 'idm.napiany.com'
            stalwart:
              certificate_blocks:
                - domains:
                    - 'mail.napiany.com'
                    - 'mta-sts.napiany.com'
                    - 'autoconfig.napiany.com'
                    - 'autodiscover.napiany.com'
              mail_domains:
                - 'napiany.com'
    desktops:
      hosts:
        localhost:
          ansible_connection: 'local'
  vars:
    ansible_user: 'robin'
    ansible_python_interpreter: '/usr/bin/python3'
