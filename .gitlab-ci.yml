---
stages:
  - 'lint'

yamllint:
  stage: 'lint'
  image: 'python:3-alpine'
  before_script:
    - 'pip install --quiet yamllint'
  script:
    - 'yamllint .'
    - 'echo "Checking for block scalars..."'
    - '! grep -rn --include="*.yaml" -E ":\s+[|>]\s*$" . || { echo "Block scalars (| or >) are not allowed. Use quoted strings instead."; exit 1; }'

ansible-lint:
  stage: 'lint'
  image: 'python:3-alpine'
  before_script:
    - 'pip install --quiet ansible-lint'
    - 'ansible-galaxy collection install community.general'
  script:
    - 'ansible-lint'
